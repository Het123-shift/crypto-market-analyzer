                <div class="footer">
                  <p>🛡️ AI-generated analysis is educational only, not financial advice.</p>
                  <p>Sent to ${targetEmail} • <a href="http://localhost:7788/#/alerts">Manage alerts</a></p>
                </div>
              </div>
            </body>
            </html>
          `;

          setEmailPreviewHtml(htmlContent);

          try {
            const res = await fetch("http://localhost:5000/api/alerts/digest", {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                email: targetEmail,
                name: userProfile?.displayName || "Trader",
                digestType: "live-report",
                coins: coins,
                aiMarketSummary: aiSummary
              })
            });

            if (res.ok) {
              setDispatchStatus('success');
            } else {
              throw new Error("SMTP service offline");
            }
          } catch (serverErr) {

              id: "mail_" + Math.random().toString(36).substring(2, 9),

            const localLogs = JSON.parse(localStorage.getItem("ag_sent_emails") || "[]");
            localLogs.unshift(logItem);

      const evtTypes = useMemo(() => ['All', ...new Set(events.map(e => e.type))], [events]);
      const filteredEvts = useMemo(() => evtFilter === 'All' ? events : events.filter(e => e.type === evtFilter), [events, evtFilter]);

        return { ratio: (g / coins.length * 100).toFixed(1), btc, top, bot, gainers: g, losers: coins.length - g };

                {lastFetched && <span style={{ color: '#4b5563', marginLeft: '0.5rem' }}>• Refreshed {Math.round((Date.now() - lastFetched.getTime()) / 60000)}m ago</span>}

            <div style={{ display: 'flex', gap: '0.5rem', alignItems: 'center' }}>
              <button onClick={() => { setShowEmailModal(true); setDispatchStatus('idle'); setDispatchError(''); }} style={{ display: 'flex', alignItems: 'center', gap: '0.375rem', padding: '0.5rem 0.875rem', background: 'rgba(99,102,241,0.15)', border: '1px solid rgba(99,102,241,0.3)', borderRadius: '0.625rem', color: '#a5b4fc', fontSize: '0.75rem', fontWeight: 700, cursor: 'pointer', transition: 'all 0.2s' }} onMouseEnter={e => e.currentTarget.style.background = 'rgba(99,102,241,0.25)'} onMouseLeave={e => e.currentTarget.style.background = 'rgba(99,102,241,0.15)'}>
                <Icons.Mail size={13} /> Email AI Report
              </button>
              <button onClick={() => fetchNews(newsCat, true)} disabled={newsLoading} style={{ display: 'flex', alignItems: 'center', gap: '0.375rem', padding: '0.5rem 0.875rem', background: 'rgba(99,102,241,0.1)', border: '1px solid rgba(99,102,241,0.2)', borderRadius: '0.625rem', color: '#818cf8', fontSize: '0.75rem', fontWeight: 700, cursor: 'pointer', opacity: newsLoading ? 0.5 : 1 }}>
                <Icons.RefreshCw size={13} style={{ animation: newsLoading ? 'orbFloat 1s linear infinite' : 'none' }} /> Refresh
              </button>
            </div>
          </div>

          {/* Live Market Pulse */}
          {pulse && (

                {NEWS_CATS.map(cat => (
                  <button key={cat} onClick={() => setNewsCat(cat)} style={{ padding: '0.3rem 0.75rem', borderRadius: '9999px', fontSize: '0.75rem', fontWeight: 600, cursor: 'pointer', border: 'none', transition: 'all 0.15s', background: newsCat === cat ? 'rgba(99,102,241,0.2)' : 'rgba(31,41,55,0.5)', color: newsCat === cat ? '#c7d2fe' : '#6b7280', boxShadow: newsCat === cat ? '0 0 0 1px rgba(99,102,241,0.4)' : 'none' }}>{cat}</button>

      const fetchMarketData = useCallback(async (force = false) => {
        const lastFetch = localStorage.getItem("last_coingecko_fetch_time");
        const now = Date.now();
        if (!force && lastFetch && now - parseInt(lastFetch) < 10000 && coins.length > 0) return;
        setLoading(true);
        try {
          const res = await fetch("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=250&page=1&sparkline=true&price_change_percentage=24h,7d,30d");
          const data = await res.json();
          if (Array.isArray(data)) {
            setCoins(prev => {
              if (prev.length === 0) return data;
              return data.map(nc => { const oc = prev.find(c => c.id === nc.id); let fc = ""; if (oc) { if (nc.current_price > oc.current_price) fc = "flash-green-bg"; else if (nc.current_price < oc.current_price) fc = "flash-red-bg"; } return { ...nc, flashClass: fc }; });
            });
            setIsOnline(true); setLastUpdated(new Date());
            localStorage.setItem("last_coingecko_fetch_time", Date.now().toString());
            localStorage.setItem("cached_coingecko_data", JSON.stringify(data));
          }
        } catch (error) {
          console.error("CoinGecko API failed. Serving cache.", error);
          setIsOnline(false);
          const cached = localStorage.getItem("cached_coingecko_data");
          if (cached) setCoins(JSON.parse(cached));
        } finally { setLoading(false); setCountdown(60); }
      }, [coins.length]);

      useEffect(() => { fetchMarketData(); }, []);
      useEffect(() => { const timer = setInterval(() => { setCountdown(prev => { if (prev <= 1) { fetchMarketData(); return 60; } return prev - 1; }); }, 1000); return () => clearInterval(timer); }, [fetchMarketData]);
      useEffect(() => { const on = () => setIsOnline(true); const off = () => setIsOnline(false); window.addEventListener("online", on); window.addEventListener("offline", off); return () => { window.removeEventListener("online", on); window.removeEventListener("offline", off); }; }, []);

      return (

            <Route path="/login" element={currentUser ? <Navigate to="/" replace /> : <LoginSignup />} />

    // Build a rich market context string from live CoinGecko data
    function buildMarketContext(coins) {
      if (!coins || coins.length === 0) return "Live market data is currently loading.";
      const top20 = coins.slice(0, 20);
      const gainers = [...coins].sort((a, b) => (b.price_change_percentage_24h || 0) - (a.price_change_percentage_24h || 0)).slice(0, 5);
      const losers = [...coins].sort((a, b) => (a.price_change_percentage_24h || 0) - (b.price_change_percentage_24h || 0)).slice(0, 5);
      const totalGainers = coins.filter(c => (c.price_change_percentage_24h || 0) > 0).length;
      const breadth = ((totalGainers / coins.length) * 100).toFixed(1);
      const fngScore = Math.min(100, Math.max(0, Math.round((totalGainers / coins.length) * 70 + 30)));
      const fngLabel = fngScore >= 75 ? 'Extreme Greed' : fngScore >= 60 ? 'Greed' : fngScore >= 45 ? 'Neutral' : fngScore >= 30 ? 'Fear' : 'Extreme Fear';
      const fmt2 = (n) => (n == null ? 'N/A' : Number(n).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 6 }));
      const fmtPct = (n) => (n == null ? 'N/A' : (n >= 0 ? '+' : '') + Number(n).toFixed(2) + '%');
      const fmtMcap = (n) => n ? '$' + (n >= 1e12 ? (n / 1e12).toFixed(2) + 'T' : n >= 1e9 ? (n / 1e9).toFixed(2) + 'B' : n >= 1e6 ? (n / 1e6).toFixed(2) + 'M' : n.toLocaleString()) : 'N/A';

      const topTable = top20.map(c =>
        `  ${c.market_cap_rank}. ${c.name} (${c.symbol.toUpperCase()}): $${fmt2(c.current_price)} | 24h: ${fmtPct(c.price_change_percentage_24h)} | 7d: ${fmtPct(c.price_change_percentage_7d_in_currency)} | MCap: ${fmtMcap(c.market_cap)}`
      ).join('\n');

      const gainersStr = gainers.map(c => `  ${c.name} (${c.symbol.toUpperCase()}): ${fmtPct(c.price_change_percentage_24h)}`).join('\n');
      const losersStr = losers.map(c => `  ${c.name} (${c.symbol.toUpperCase()}): ${fmtPct(c.price_change_percentage_24h)}`).join('\n');

      return `=== LIVE MARKET DATA (from CoinGecko, real-time) ===
Date/Time: ${new Date().toUTCString()}

MARKET SENTIMENT:
  Fear & Greed Index (estimated): ${fngScore}/100 — ${fngLabel}
  Market Breadth: ${breadth}% of top-250 coins are positive (24h)
  Total coins tracked: ${coins.length}

TOP 20 CRYPTOCURRENCIES BY MARKET CAP:
${topTable}

TOP 5 GAINERS (24h):
${gainersStr}

TOP 5 LOSERS (24h):
${losersStr}
=== END MARKET DATA ===`;
    }

    async function callGeminiAPI(apiKey, conversationHistory, userMessage, coins) {
      const marketContext = buildMarketContext(coins);

      // Build contents array from history + new user message
      const contents = [];

      // Add conversation history (alternating user/model)
      for (const msg of conversationHistory) {
        contents.push({
          role: msg.role === 'user' ? 'user' : 'model',
          parts: [{ text: msg.role === 'user' ? msg.text : msg.text }]
        });
      }

      // Add the new user message with market context prepended to first message
      const enrichedUserMsg = conversationHistory.length === 0
        ? `${marketContext}\n\nUser Question: ${userMessage}`
        : `[Live market data refreshed at ${new Date().toLocaleTimeString()}]\n${marketContext}\n\nUser Question: ${userMessage}`;

      contents.push({ role: 'user', parts: [{ text: enrichedUserMsg }] });

      const payload = {
        system_instruction: { parts: [{ text: NOVA_SYSTEM_PROMPT }] },
        contents,
        generationConfig: {
          temperature: 0.7,
          topK: 40,
          topP: 0.95,
          maxOutputTokens: 1024,
        },
        safetySettings: [
          { category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" },
          { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_NONE" },
          { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE" },
          { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" },
        ]
      };

      const res = await fetch(`${GEMINI_ENDPOINT}?key=${apiKey}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        const errMsg = err?.error?.message || `HTTP ${res.status}`;
        if (res.status === 400) throw new Error('INVALID_KEY');
        if (res.status === 403) throw new Error('INVALID_KEY');
        if (res.status === 429) throw new Error('RATE_LIMIT');
        throw new Error(errMsg);
      }

      const data = await res.json();
      const text = data?.candidates?.[0]?.content?.parts?.[0]?.text;
      if (!text) throw new Error('Empty response from Gemini');
      return text.trim();
    }

    function formatMsgText(text) {
      return text.split('\n').map((line, i) => {
        const parts = line.split(/(\*\*[^*]+\*\*)/g);
        return (
          <span key={i}>
            {parts.map((part, j) => {
              if (part.startsWith('**') && part.endsWith('**')) {
                return <strong key={j} style={{ color: '#e2e8f0', fontWeight: 700 }}>{part.slice(2, -2)}</strong>;
              }
              return <span key={j}>{part}</span>;
            })}
            {i < text.split('\n').length - 1 && <br />}
          </span>
        );
      });
    }

    const QUICK_CHIPS = [
      "📈 Market Overview", "₿ Analyze Bitcoin", "⧫ Analyze Ethereum",
      "🌊 Analyze Solana", "😱 Fear & Greed", "💼 Portfolio Strategy",
      "📊 Alt Season?", "🛡️ Risk Management", "💰 What is DCA?",
    ];
    const CHIP_QUERIES = {
      "📈 Market Overview": "Give me a full market overview with current sentiment and top movers.",
      "₿ Analyze Bitcoin": "Analyze Bitcoin with current price data. Should I buy, hold, or sell? Give me your full analysis.",
      "⧫ Analyze Ethereum": "Analyze Ethereum in detail. Include price, momentum, and a buy/hold/sell verdict.",
      "🌊 Analyze Solana": "Give me a detailed analysis of Solana. What is your verdict?",
      "😱 Fear & Greed": "What is the current fear and greed index? What does it mean for my portfolio?",
      "💼 Portfolio Strategy": "What is the best crypto portfolio allocation strategy right now given current market conditions?",
      "📊 Alt Season?": "Is it alt season right now? Use the current market data to analyze.",
      "🛡️ Risk Management": "How should I manage risk in crypto trading? Give me specific actionable advice.",
      "💰 What is DCA?": "Explain dollar cost averaging and how I should apply it in the current market.",
    };

    function APIKeySetup({ onSave }) {
      const [key, setKey] = useState('');
      const [testing, setTesting] = useState(false);
      const [error, setError] = useState('');

      const handleSave = async () => {
        const trimmed = key.trim();
        if (!trimmed) { setError('Please enter your API key.'); return; }
        if (!trimmed.startsWith('AIza')) { setError('Invalid key format. Gemini keys start with "AIza".'); return; }
        setTesting(true); setError('');
        try {
          // Test with a minimal call
          const res = await fetch(`${GEMINI_ENDPOINT}?key=${trimmed}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: [{ role: 'user', parts: [{ text: 'Hi' }] }], generationConfig: { maxOutputTokens: 5 } })
          });
          if (res.status === 400 || res.status === 403) { setError('API key is invalid or has no access. Check the key and try again.'); return; }
          localStorage.setItem('nova_gemini_key', trimmed);
          onSave(trimmed);
        } catch (e) {
          setError('Network error. Check your internet connection and try again.');
        } finally { setTesting(false); }
      };

      return (
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', justifyContent: 'center', padding: '1.5rem', gap: '1rem' }}>
          <div style={{ textAlign: 'center', marginBottom: '0.5rem' }}>
            <div style={{ width: '3rem', height: '3rem', borderRadius: '9999px', background: 'linear-gradient(135deg, #6366f1, #8b5cf6)', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 0.75rem', boxShadow: '0 0 24px rgba(99,102,241,0.4)' }}>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3" /><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83" /></svg>
            </div>
            <div style={{ fontWeight: 700, color: '#e2e8f0', fontSize: '1rem', marginBottom: '0.25rem' }}>Connect Google Gemini AI</div>
            <div style={{ fontSize: '0.75rem', color: '#6b7280', lineHeight: 1.5 }}>NOVA uses Google Gemini to give you real, accurate financial analysis powered by live market data.</div>
          </div>

          <div style={{ background: 'rgba(99,102,241,0.07)', border: '1px solid rgba(99,102,241,0.2)', borderRadius: '0.75rem', padding: '0.875rem', fontSize: '0.75rem', color: '#a5b4fc', lineHeight: 1.6 }}>
            <div style={{ fontWeight: 700, marginBottom: '0.375rem', color: '#c7d2fe' }}>🆓 Get a FREE API Key in 30 seconds:</div>
            <div>1. Go to <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener" style={{ color: '#818cf8', textDecoration: 'underline' }}>aistudio.google.com/app/apikey</a></div>
            <div>2. Click <strong style={{ color: '#e2e8f0' }}>"Create API Key"</strong></div>
            <div>3. Copy and paste it below</div>
            <div style={{ marginTop: '0.375rem', color: '#4b5563' }}>✓ Free tier: 15 req/min, 1M tokens/day. No credit card needed.</div>
          </div>

          <div>
            <label style={{ fontSize: '11px', color: '#6b7280', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.05em', display: 'block', marginBottom: '0.375rem' }}>Your Gemini API Key</label>
            <div style={{ display: 'flex', gap: '0.5rem' }}>
              <input
                type="password"
                value={key}
                onChange={e => { setKey(e.target.value); setError(''); }}
                onKeyDown={e => e.key === 'Enter' && handleSave()}
                placeholder="AIza..."
                style={{ flex: 1, background: 'rgba(20,20,35,0.8)', border: '1px solid rgba(99,102,241,0.25)', borderRadius: '0.625rem', padding: '0.5rem 0.75rem', color: '#e2e8f0', fontSize: '0.8125rem', fontFamily: 'monospace', outline: 'none' }}
              />
              <button onClick={handleSave} disabled={testing || !key.trim()} style={{ padding: '0.5rem 0.875rem', background: 'linear-gradient(135deg, #6366f1, #7c3aed)', border: 'none', borderRadius: '0.625rem', color: '#fff', fontSize: '0.75rem', fontWeight: 700, cursor: 'pointer', flexShrink: 0, opacity: (testing || !key.trim()) ? 0.5 : 1 }}>
                {testing ? '...' : 'Connect'}
              </button>
            </div>
            {error && <div style={{ marginTop: '0.375rem', fontSize: '0.75rem', color: '#f87171' }}>⚠️ {error}</div>}
          </div>

          <div style={{ fontSize: '10px', color: '#374151', textAlign: 'center', marginTop: '0.25rem' }}>
            🔒 Your key is stored only in your browser's localStorage. Never sent anywhere except Google's API.
          </div>
        </div>
      );
    }

    function AIAssistant({ coins }) {
      const [apiKey, setApiKey] = useState(() => localStorage.getItem('nova_gemini_key') || '');
      const [isOpen, setIsOpen] = useState(false);
      const [isAnimatingOut, setIsAnimatingOut] = useState(false);
      const [showSettings, setShowSettings] = useState(false);
      const [messages, setMessages] = useState([
        {
          id: 1, role: 'bot',
          text: `👋 Hello! I'm **NOVA**, your AI-powered crypto market analyst.\n\nI'm connected to **Google Gemini AI** and have access to **live real-time market data** from CoinGecko — so every analysis I give is grounded in actual current prices and market conditions.\n\nAsk me anything about any coin, the market, or investment strategy!`,
          time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        }
      ]);
      // conversationHistory stores {role, text} for Gemini context (excludes system welcome)
      const [conversationHistory, setConversationHistory] = useState([]);
      const [inputVal, setInputVal] = useState('');
      const [isTyping, setIsTyping] = useState(false);
      const [typingStatus, setTypingStatus] = useState('Analyzing...');
      const [showChips, setShowChips] = useState(true);
      const [apiError, setApiError] = useState('');
      const messagesEndRef = useRef(null);
      const inputRef = useRef(null);
      const msgIdRef = useRef(2);

      useEffect(() => {
        if (messagesEndRef.current) messagesEndRef.current.scrollIntoView({ behavior: 'smooth' });
      }, [messages, isTyping]);

      const handleClose = () => {
        setIsAnimatingOut(true);
        setShowSettings(false);
        setTimeout(() => { setIsOpen(false); setIsAnimatingOut(false); }, 240);
      };

      const handleKeyConnected = (key) => {
        setApiKey(key);
        setShowSettings(false);
        setApiError('');
        const welcomeMsg = {
          id: msgIdRef.current++, role: 'bot',
          text: `✅ **Gemini AI Connected!**\n\nNOVA is now powered by **Google Gemini 2.0 Flash** with access to live market data.\n\nI can now give you:\n• 📊 Real-time coin analysis with live prices\n• 🎯 Accurate Buy/Hold/Sell verdicts with reasoning\n• 📈 Market sentiment based on current breadth\n• 💼 Portfolio strategies tailored to current conditions\n\nWhat would you like to analyze first?`,
          time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        };
        setMessages(prev => [...prev, welcomeMsg]);
        setShowChips(true);
      };

      const handleDisconnect = () => {
        localStorage.removeItem('nova_gemini_key');
        setApiKey('');
        setConversationHistory([]);
        setMessages([{ id: msgIdRef.current++, role: 'bot', text: '🔌 API key removed. Connect a new Gemini API key to restore AI-powered analysis.', time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) }]);
        setShowSettings(false);
        setShowChips(false);
      };

      const sendMessage = async (text) => {
        const trimmed = (text || inputVal).trim();
        if (!trimmed || isTyping) return;
        setInputVal('');
        setShowChips(false);
        setApiError('');
        const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const userMsg = { id: msgIdRef.current++, role: 'user', text: trimmed, time: now };
        setMessages(prev => [...prev, userMsg]);
        setIsTyping(true);

        // Add user msg to conversation history
        const updatedHistory = [...conversationHistory, { role: 'user', text: trimmed }];

        try {
          if (!apiKey) {
            // Soft fallback when no key
            await new Promise(r => setTimeout(r, 600));
            const fallbackMsg = {
              id: msgIdRef.current++, role: 'bot',
              text: `⚠️ **No AI Key Connected**\n\nTo get accurate, real-time financial analysis, please connect your free Google Gemini API key.\n\nClick the **⚙️ settings** button in the header to set it up in 30 seconds.\n\n🆓 Get a free key at: aistudio.google.com/app/apikey`,
              time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            };
            setMessages(prev => [...prev, fallbackMsg]);
            setIsTyping(false);
            return;
          }

          // Rotate typing status messages for better UX
          const statuses = ['Fetching market data...', 'Analyzing with Gemini AI...', 'Computing signals...', 'Formulating advice...'];
          let si = 0;
          const statusInterval = setInterval(() => { si = (si + 1) % statuses.length; setTypingStatus(statuses[si]); }, 1200);

          const responseText = await callGeminiAPI(apiKey, conversationHistory, trimmed, coins);
          clearInterval(statusInterval);

          const botMsg = { id: msgIdRef.current++, role: 'bot', text: responseText, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) };
          setMessages(prev => [...prev, botMsg]);

          // Update conversation history (keep last 8 exchanges to stay within token limits)
          const newHistory = [...updatedHistory, { role: 'model', text: responseText }];
          setConversationHistory(newHistory.slice(-16)); // 8 user + 8 model

        } catch (err) {
          const errText = err.message;
          let userFriendly = '';
          if (errText === 'INVALID_KEY') {
            userFriendly = `❌ **Invalid API Key**\n\nYour Gemini API key was rejected. Please:\n1. Check the key is copied correctly\n2. Ensure it's a **Gemini** key from aistudio.google.com\n3. Click ⚙️ to update your key`;
            localStorage.removeItem('nova_gemini_key');
            setApiKey('');
          } else if (errText === 'RATE_LIMIT') {
            userFriendly = `⏳ **Rate Limit Reached**\n\nYou've hit the free tier limit (15 requests/min). Please wait 60 seconds and try again.\n\nFree tier: 15 req/min, 1M tokens/day.`;
          } else if (errText.includes('fetch') || errText.includes('network')) {
            userFriendly = `🌐 **Network Error**\n\nCouldn't reach Google's API. Please check your internet connection and try again.`;
          } else {
            userFriendly = `⚠️ **Error:** ${errText}\n\nPlease try again. If the issue persists, check your API key in ⚙️ settings.`;
          }
          const errMsg = { id: msgIdRef.current++, role: 'bot', text: userFriendly, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) };
          setMessages(prev => [...prev, errMsg]);
          setConversationHistory(updatedHistory.slice(0, -1)); // remove failed user msg from history
        } finally {
          setIsTyping(false);
          setTypingStatus('Analyzing...');
        }
      };

      const handleKeyDown = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };
      const handleChip = (chip) => { sendMessage(CHIP_QUERIES[chip] || chip); };
      const handleClear = () => {
        setMessages([{ id: msgIdRef.current++, role: 'bot', text: `🔄 Conversation cleared!\n\nI'm ready for a fresh analysis. What would you like to know?`, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) }]);
        setConversationHistory([]);
        setShowChips(true);
      };

      const isConnected = !!apiKey;

      return (
        <>
          {/* FAB */}
          {!isOpen && (
            <button className="ai-fab" onClick={() => setIsOpen(true)} title="Open NOVA AI Assistant" id="ai-assistant-fab">
              <span className="ai-fab-badge"></span>
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
              </svg>
            </button>
          )}

          {/* PANEL */}
          {(isOpen || isAnimatingOut) && (
            <div className={"ai-panel " + (isAnimatingOut ? 'close' : 'open')} id="ai-assistant-panel">

              {/* Header */}
              <div className="ai-header">
                <div className="ai-avatar">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <circle cx="12" cy="12" r="3" /><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83" />
                  </svg>
                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontWeight: 700, color: '#e2e8f0', fontSize: '0.9rem', letterSpacing: '-0.01em' }}>NOVA AI</div>
                  <div style={{ fontSize: '10px', fontWeight: 600, display: 'flex', alignItems: 'center', gap: '0.3rem', color: isConnected ? '#6366f1' : '#f59e0b' }}>
                    <span style={{ width: '6px', height: '6px', background: isConnected ? '#22c55e' : '#f59e0b', borderRadius: '9999px', display: 'inline-block' }}></span>
                    {isConnected ? 'Gemini 2.0 Flash • Live Data' : 'No AI Key — Click ⚙️ to connect'}
                  </div>
                </div>
                <div style={{ display: 'flex', gap: '0.375rem' }}>
                  <button onClick={() => setShowSettings(s => !s)} title={isConnected ? "API Settings" : "Connect AI"} style={{ background: showSettings ? 'rgba(99,102,241,0.2)' : 'rgba(99,102,241,0.1)', border: '1px solid rgba(99,102,241,0.2)', borderRadius: '0.5rem', color: '#818cf8', cursor: 'pointer', width: '1.875rem', height: '1.875rem', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                    <Icons.Settings size={13} />
                  </button>
                  <button onClick={handleClear} title="Clear chat" style={{ background: 'rgba(99,102,241,0.1)', border: '1px solid rgba(99,102,241,0.2)', borderRadius: '0.5rem', color: '#818cf8', cursor: 'pointer', width: '1.875rem', height: '1.875rem', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                    <Icons.RotateCcw size={13} />
                  </button>
                  <button onClick={handleClose} title="Close" style={{ background: 'rgba(239,68,68,0.1)', border: '1px solid rgba(239,68,68,0.2)', borderRadius: '0.5rem', color: '#f87171', cursor: 'pointer', width: '1.875rem', height: '1.875rem', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                    <Icons.X size={13} />
                  </button>
                </div>
              </div>

              {/* Settings Panel */}
              {showSettings && (
                <div style={{ borderBottom: '1px solid rgba(99,102,241,0.12)', background: 'rgba(10,10,20,0.95)', padding: '1rem', flexShrink: 0 }}>
                  {isConnected ? (
                    <div>
                      <div style={{ fontSize: '0.75rem', fontWeight: 700, color: '#e2e8f0', marginBottom: '0.5rem' }}>✅ Gemini AI Connected</div>
                      <div style={{ fontSize: '0.7rem', color: '#6b7280', fontFamily: 'monospace', background: 'rgba(20,20,35,0.8)', padding: '0.375rem 0.625rem', borderRadius: '0.375rem', marginBottom: '0.625rem', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                        {apiKey.substring(0, 12)}{'•'.repeat(Math.max(0, apiKey.length - 16))}{apiKey.slice(-4)}
                      </div>
                      <div style={{ display: 'flex', gap: '0.5rem' }}>
                        <button onClick={handleDisconnect} style={{ flex: 1, padding: '0.375rem', background: 'rgba(239,68,68,0.1)', border: '1px solid rgba(239,68,68,0.25)', borderRadius: '0.5rem', color: '#f87171', fontSize: '0.7rem', fontWeight: 700, cursor: 'pointer' }}>
                          🔌 Disconnect
                        </button>
                        <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener" style={{ flex: 1, padding: '0.375rem', background: 'rgba(99,102,241,0.1)', border: '1px solid rgba(99,102,241,0.25)', borderRadius: '0.5rem', color: '#a5b4fc', fontSize: '0.7rem', fontWeight: 700, cursor: 'pointer', textAlign: 'center', textDecoration: 'none', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                          🔑 AI Studio
                        </a>
                      </div>
                    </div>
                  ) : (
                    <APIKeySetup onSave={handleKeyConnected} />
                  )}
                </div>
              )}

              {/* Messages */}
              {!showSettings && (
                <>
                  <div className="ai-messages">
                    {messages.map(msg => (
                      <div key={msg.id} className={"ai-msg " + msg.role}>
                        {msg.role === 'bot' && (
                          <div style={{ display: 'flex', alignItems: 'flex-end', gap: '0.4rem' }}>
                            <div style={{ width: '1.5rem', height: '1.5rem', borderRadius: '9999px', background: 'linear-gradient(135deg, #6366f1, #8b5cf6)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, marginBottom: '1px' }}>
                              <svg width="9" height="9" viewBox="0 0 24 24" fill="white" stroke="none"><circle cx="12" cy="12" r="10" /></svg>
                            </div>
                            <div className="ai-bubble">{formatMsgText(msg.text)}</div>
                          </div>
                        )}
                        {msg.role === 'user' && <div className="ai-bubble">{msg.text}</div>}
                        <div className="ai-msg-time">{msg.time}</div>
                      </div>
                    ))}
                    {isTyping && (
                      <div className="ai-msg bot">
                        <div style={{ display: 'flex', alignItems: 'flex-end', gap: '0.4rem' }}>
                          <div style={{ width: '1.5rem', height: '1.5rem', borderRadius: '9999px', background: 'linear-gradient(135deg, #6366f1, #8b5cf6)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                            <svg width="9" height="9" viewBox="0 0 24 24" fill="white" stroke="none"><circle cx="12" cy="12" r="10" /></svg>
                          </div>
                          <div className="ai-typing-bubble">
                            <div className="ai-typing-dot"></div>
                            <div className="ai-typing-dot"></div>
                            <div className="ai-typing-dot"></div>
                          </div>
                        </div>
                        <div className="ai-msg-time">{typingStatus}</div>
                      </div>
                    )}
                    <div ref={messagesEndRef} />
                  </div>

                  {/* Quick Chips */}
                  {showChips && isConnected && (
                    <div className="ai-quick-chips">
                      {QUICK_CHIPS.map(chip => (
                        <button key={chip} className="ai-chip" onClick={() => handleChip(chip)} disabled={isTyping}>{chip}</button>
                      ))}
                    </div>
                  )}
                  {!showChips && isConnected && (
                    <div style={{ padding: '0.375rem 1rem', borderTop: '1px solid rgba(99,102,241,0.08)', display: 'flex', gap: '0.375rem', overflowX: 'auto', flexShrink: 0 }}>
                      {['₿ BTC', '⧫ ETH', '🌊 SOL', '📈 Market', '😱 Fear & Greed'].map(chip => (
                        <button key={chip} className="ai-chip" style={{ flexShrink: 0 }} onClick={() => handleChip(CHIP_QUERIES[chip] || `Analyze ${chip.replace(/[^a-zA-Z ]/g, '').trim()}`)} disabled={isTyping}>{chip}</button>
                      ))}
                    </div>
                  )}
                  {!isConnected && !showSettings && (
                    <div style={{ padding: '0.75rem 1rem', borderTop: '1px solid rgba(99,102,241,0.1)', flexShrink: 0 }}>
                      <button onClick={() => setShowSettings(true)} style={{ width: '100%', padding: '0.625rem', background: 'linear-gradient(135deg, #6366f1, #7c3aed)', border: 'none', borderRadius: '0.75rem', color: '#fff', fontSize: '0.8rem', fontWeight: 700, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '0.375rem' }}>
                        <Icons.Key size={14} /> Connect Free Gemini AI Key
                      </button>
                    </div>
                  )}

                  {/* Input */}
                  <div className="ai-input-row">
                    <textarea
                      ref={inputRef}
                      className="ai-input"
                      rows={1}
                      value={inputVal}
                      onChange={e => setInputVal(e.target.value)}
                      onKeyDown={handleKeyDown}
                      placeholder={isConnected ? "Ask about any coin, market, or strategy..." : "Connect Gemini AI key to start chatting..."}
                      disabled={isTyping}
                      style={{ lineHeight: '1.4', maxHeight: '80px', overflowY: 'auto' }}
                    />
                    <button className="ai-send-btn" onClick={() => sendMessage()} disabled={isTyping || !inputVal.trim()} title="Send">
                      <Icons.Send size={15} />
                    </button>
                  </div>
                </>
              )}
            </div>
          )}
        </>
      );
    }

    // =====================================================
    // RENDER
    // =====================================================
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
