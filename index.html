    /* Marquee */
    @keyframes marquee {
      0% {
        transform: translateX(0%);
      }

      100% {
        transform: translateX(-50%);
      }
    }

    .animate-marquee {
      display: flex;
      width: max-content;
      animation: marquee 40s linear infinite;
    }

    .animate-marquee:hover {
      animation-play-state: paused;
    }

    /* Flash */
    @keyframes flashGreen {
      0% {
        background-color: rgba(34, 197, 94, 0.2);
      }

      100% {
        background-color: transparent;
      }
    }

    @keyframes flashRed {
      0% {
        background-color: rgba(239, 68, 68, 0.2);
      }

      100% {
        background-color: transparent;
      }
    }

    .flash-green-bg {
      animation: flashGreen 1s ease-out;
    }

    .flash-red-bg {
      animation: flashRed 1s ease-out;
    }

    /* Glass */
    .glass-panel {
      background: rgba(13, 13, 22, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .glass-card {
      background: rgba(20, 20, 31, 0.5);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.03);
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .glass-card:hover {
      background: rgba(24, 24, 37, 0.7);
      border-color: rgba(59, 130, 246, 0.2);
      transform: translateY(-2px);
      box-shadow: 0 10px 20px -10px rgba(59, 130, 246, 0.15);
    }

    /* Skeleton */
    @keyframes skeleton-pulse {

      0%,
      100% {
        background-color: rgba(31, 41, 55, 0.5);
      }

      50% {
        background-color: rgba(55, 65, 81, 0.5);
      }
    }

    .skeleton-loading {
      animation: skeleton-pulse 1.5s ease-in-out infinite;
    }

    /* Fade In */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-fade-in {
      animation: fadeIn 0.4s ease-out;
    }

    /* Slide Up */
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-slide-up {
      animation: slideUp 0.3s ease-out;
    }

    /* Spin */
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .animate-spin {
      animation: spin 1s linear infinite;
    }

    /* Ping */
    @keyframes ping {

      75%,
      100% {
        transform: scale(2);
        opacity: 0;
      }
    }

    .animate-ping {
      animation: ping 1s cubic-bezier(0, 0, 0.2, 1) infinite;
    }

        opacity: .5;

<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    const { useState, useEffect, useCallback, createContext, useContext, useMemo, useRef } = React;
    const { HashRouter: Router, Routes, Route, Navigate, Link, useLocation, useParams } = ReactRouterDOM;
    const { ResponsiveContainer, AreaChart, Area, XAxis, YAxis, Tooltip, CartesianGrid } = Recharts;
    const Icons = LucideReact;

    // =====================================================
    // SECTION 1: AUTH CONTEXT (localStorage mock)
    // =====================================================
    const AuthContext = createContext();
    function useAuth() { return useContext(AuthContext); }

    function AuthProvider({ children }) {
      const [currentUser, setCurrentUser] = useState(null);
      const [userProfile, setUserProfile] = useState(null);
      const [loading, setLoading] = useState(true);

      const fetchUserProfile = (uid, email) => {
        const mockUsers = JSON.parse(localStorage.getItem("mock_users") || "{}");
        const profile = mockUsers[uid] || { uid, email, displayName: email.split("@")[0], emailVerified: false, watchlist: [], alerts: [], portfolio: [], createdAt: new Date().toISOString() };
        setUserProfile(profile);
        return profile;
      };

      useEffect(() => {
        const storedSession = localStorage.getItem("mock_active_session");
        if (storedSession) {
          const sessionUser = JSON.parse(storedSession);
          setCurrentUser(sessionUser);
          fetchUserProfile(sessionUser.uid, sessionUser.email);
        }
        setLoading(false);
      }, []);

      const signup = async (name, email, password) => {
        const mockUsers = JSON.parse(localStorage.getItem("mock_users") || "{}");
        const emailExists = Object.values(mockUsers).some(u => u.email.toLowerCase() === email.toLowerCase());
        if (emailExists) throw new Error("auth/email-already-in-use");
        const uid = "mock_uid_" + Math.random().toString(36).substring(2, 9);
        const newUser = { uid, email, displayName: name, emailVerified: false, watchlist: [], alerts: [], portfolio: [], createdAt: new Date().toISOString() };
        mockUsers[uid] = newUser;
        localStorage.setItem("mock_users", JSON.stringify(mockUsers));
        return newUser;
      };

      const login = async (email, password) => {
        const mockUsers = JSON.parse(localStorage.getItem("mock_users") || "{}");
        const userMatch = Object.values(mockUsers).find(u => u.email.toLowerCase() === email.toLowerCase());
        if (!userMatch) throw new Error("auth/user-not-found");
        if (!userMatch.emailVerified) throw new Error("auth/email-not-verified");
        const sessionUser = { uid: userMatch.uid, email: userMatch.email, displayName: userMatch.displayName, emailVerified: true };
        localStorage.setItem("mock_active_session", JSON.stringify(sessionUser));
        setCurrentUser(sessionUser);
        setUserProfile(userMatch);
        return sessionUser;
      };

      const resetPassword = async (email) => { console.log("[MOCK RESET PASSWORD] Link sent to", email); return true; };

      const logout = async () => {
        localStorage.removeItem("mock_active_session");
        setCurrentUser(null);
        setUserProfile(null);
      };

      const simulateVerifyEmail = (email) => {
        const mockUsers = JSON.parse(localStorage.getItem("mock_users") || "{}");
        const userKey = Object.keys(mockUsers).find(k => mockUsers[k].email.toLowerCase() === email.toLowerCase());
        if (userKey) { mockUsers[userKey].emailVerified = true; localStorage.setItem("mock_users", JSON.stringify(mockUsers)); return true; }
        return false;
      };

      const toggleWatchlist = async (coinId) => {
        if (!userProfile) return;
        const isWatched = userProfile.watchlist?.includes(coinId);
        const newWatchlist = isWatched ? userProfile.watchlist.filter(id => id !== coinId) : [...(userProfile.watchlist || []), coinId];
        const mockUsers = JSON.parse(localStorage.getItem("mock_users") || "{}");
        mockUsers[userProfile.uid].watchlist = newWatchlist;
        localStorage.setItem("mock_users", JSON.stringify(mockUsers));
        setUserProfile(prev => ({ ...prev, watchlist: newWatchlist }));
      };

      const addAlert = async (alertData) => {
        if (!userProfile) return;
        const newAlert = { id: "alert_" + Math.random().toString(36).substring(2, 9), createdAt: new Date().toISOString(), isActive: true, ...alertData };
        const newAlerts = [...(userProfile.alerts || []), newAlert];
        const mockUsers = JSON.parse(localStorage.getItem("mock_users") || "{}");
        mockUsers[userProfile.uid].alerts = newAlerts;
        localStorage.setItem("mock_users", JSON.stringify(mockUsers));
        setUserProfile(prev => ({ ...prev, alerts: newAlerts }));
      };

      const toggleAlert = async (alertId) => {
        if (!userProfile) return;
        const newAlerts = userProfile.alerts.map(a => a.id === alertId ? { ...a, isActive: !a.isActive } : a);
        const mockUsers = JSON.parse(localStorage.getItem("mock_users") || "{}");
        mockUsers[userProfile.uid].alerts = newAlerts;
        localStorage.setItem("mock_users", JSON.stringify(mockUsers));
        setUserProfile(prev => ({ ...prev, alerts: newAlerts }));
      };

      const deleteAlert = async (alertId) => {
        if (!userProfile) return;
        const newAlerts = userProfile.alerts.filter(a => a.id !== alertId);
        const mockUsers = JSON.parse(localStorage.getItem("mock_users") || "{}");
        mockUsers[userProfile.uid].alerts = newAlerts;
        localStorage.setItem("mock_users", JSON.stringify(mockUsers));
        setUserProfile(prev => ({ ...prev, alerts: newAlerts }));
      };

      const updatePortfolio = async (newPortfolio) => {
        if (!userProfile) return;
        const mockUsers = JSON.parse(localStorage.getItem("mock_users") || "{}");
        mockUsers[userProfile.uid].portfolio = newPortfolio;
        localStorage.setItem("mock_users", JSON.stringify(mockUsers));
        setUserProfile(prev => ({ ...prev, portfolio: newPortfolio }));
      };

      const value = { currentUser, userProfile, loading, signup, login, logout, resetPassword, simulateVerifyEmail, toggleWatchlist, addAlert, toggleAlert, deleteAlert, updatePortfolio, isMockFirebase: true };
      return <AuthContext.Provider value={value}>{!loading && children}</AuthContext.Provider>;
    }

    // =====================================================
    // SECTION 2: SKELETON COMPONENTS
    // =====================================================
    function Skeleton({ className = "", style = {} }) {
      return <div className={"skeleton-loading rounded-md " + className} style={style}></div>;
    }
    function CardSkeleton() {
      return (<div className="glass-card p-6 rounded-xl space-y-4"><div className="flex justify-between items-center"><Skeleton style={{ height: '1.5rem', width: '8rem' }} /><Skeleton style={{ height: '1rem', width: '4rem' }} /></div><Skeleton style={{ height: '2rem', width: '6rem' }} /><div className="space-y-2"><Skeleton style={{ height: '1rem', width: '100%' }} /><Skeleton style={{ height: '1rem', width: '83%' }} /></div></div>);
    }

    // =====================================================
    // SECTION 3: LOGIN / SIGNUP PAGE
    // =====================================================
    function LoginSignup() {
      const { signup, login, resetPassword, simulateVerifyEmail } = useAuth();
      const [isLogin, setIsLogin] = useState(true);
      const [isForgot, setIsForgot] = useState(false);
      const [name, setName] = useState("");
      const [email, setEmail] = useState("");
      const [password, setPassword] = useState("");
      const [confirmPassword, setConfirmPassword] = useState("");
      const [error, setError] = useState("");
      const [success, setSuccess] = useState("");
      const [loading, setLoading] = useState(false);
      const [needsVerification, setNeedsVerification] = useState(false);

      const handleAuth = async (e) => {
        e.preventDefault(); setError(""); setSuccess(""); setLoading(true);
        try {
          if (isLogin) { await login(email, password); }
          else {
            if (password !== confirmPassword) throw new Error("passwords-dont-match");
            if (password.length < 6) throw new Error("auth/weak-password");
            await signup(name, email, password);
            setNeedsVerification(true);
            setSuccess("Account created! Click 'Simulate Email Verification' below, then Sign In.");
          }
        } catch (err) {
          if (err.message === "passwords-dont-match") setError("Passwords do not match.");
          else if (err.message.includes("email-already-in-use")) setError("This email is already registered.");
          else if (err.message.includes("user-not-found")) setError("No account found with this email.");
          else if (err.message.includes("email-not-verified")) { setNeedsVerification(true); setError("Email not verified. Click the verify button below."); }
          else if (err.message.includes("weak-password")) setError("Password must be at least 6 characters.");
          else setError("Auth failed: " + err.message);
        } finally { setLoading(false); }
      };

      const handleForgot = async (e) => { e.preventDefault(); setError(""); setLoading(true); try { await resetPassword(email); setSuccess("Password reset link sent (mock)."); } catch (err) { setError(err.message); } finally { setLoading(false); } };
      const handleMockVerify = () => { const ok = simulateVerifyEmail(email); if (ok) { setSuccess("Email verified! You can now Sign In."); setNeedsVerification(false); setError(""); } else { setError("Email not found. Sign up first."); } };

      const inputStyle = { width: '100%', background: '#141421', border: '1px solid #1f2937', borderRadius: '0.5rem', padding: '0.75rem 1rem 0.75rem 2.5rem', color: '#fff', fontSize: '0.875rem', transition: 'border-color 0.15s' };
      const btnStyle = { width: '100%', background: '#2563eb', color: '#fff', fontWeight: 700, padding: '0.75rem 1rem', borderRadius: '0.5rem', border: 'none', cursor: 'pointer', fontSize: '0.875rem', marginTop: '0.5rem' };

      return (
        <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: '#0a0a0f', padding: '1.5rem', position: 'relative' }}>
          <div style={{ position: 'absolute', top: '25%', left: '25%', width: '24rem', height: '24rem', background: 'rgba(37,99,235,0.1)', borderRadius: '9999px', filter: 'blur(120px)', pointerEvents: 'none' }}></div>
          <div style={{ position: 'absolute', bottom: '25%', right: '25%', width: '24rem', height: '24rem', background: 'rgba(147,51,234,0.1)', borderRadius: '9999px', filter: 'blur(120px)', pointerEvents: 'none' }}></div>

    // =====================================================

    // =====================================================
    function LiveTicker({ coins, loading: isLoading, isOnline = true }) {

        <div style={{ height: '2.5rem', background: '#0d0d14', borderBottom: '1px solid #1f2937', display: 'flex', alignItems: 'center', overflow: 'hidden', position: 'relative', width: '100%', zIndex: 10 }}>

                    <span style={{ fontSize: '10px', color: isGainer ? '#22c55e' : '#ef4444' }}>{isGainer ? "▲" : "▼"} {Math.abs(coin.price_change_percentage_24h || 0).toFixed(2)}%</span>

    // =====================================================
    // SECTION 6: DASHBOARD PAGE
    // =====================================================
    function Dashboard({ coins, loading: isLoading, lastUpdated, fetchMarketData, countdown }) {
      const { userProfile } = useAuth();
      const sortedByChange = useMemo(() => {
        return [...coins].sort((a, b) => (b.price_change_percentage_24h || 0) - (a.price_change_percentage_24h || 0));
      }, [coins]);

      const topGainers = useMemo(() => sortedByChange.slice(0, 3), [sortedByChange]);
      const topLosers = useMemo(() => [...sortedByChange].reverse().slice(0, 3), [sortedByChange]);
      const watchlistCoins = useMemo(() => {
        return coins.filter(c => userProfile?.watchlist?.includes(c.id)).slice(0, 5);
      }, [coins, userProfile?.watchlist]);

      const formattedTime = lastUpdated ? lastUpdated.toLocaleTimeString() : "Never";

      // Live calculated sentiment index (Fear & Greed) based on market breadth
      const sentimentMetrics = useMemo(() => {
        if (coins.length === 0) return { score: 50, label: 'Neutral', color: '#facc15' };
        const positiveCoins = coins.filter(c => (c.price_change_percentage_24h || 0) > 0).length;
        const ratio = (positiveCoins / coins.length) * 100;

        let score = Math.round(ratio);
        // Add weight for BTC 24h performance to align with overall index feel
        const btc = coins.find(c => c.id === 'bitcoin');
        if (btc) {
          const btcChange = btc.price_change_percentage_24h || 0;
          score = Math.max(5, Math.min(95, score + Math.round(btcChange * 2)));
        }

        let label = 'Neutral';
        let color = '#facc15';
        if (score >= 75) { label = 'Extreme Greed'; color = '#22c55e'; }
        else if (score >= 55) { label = 'Greed'; color = '#4ade80'; }
        else if (score >= 45) { label = 'Neutral'; color = '#facc15'; }
        else if (score >= 25) { label = 'Fear'; color = '#f87171'; }
        else { label = 'Extreme Fear'; color = '#ef4444'; }

        return { score, label, color };
      }, [coins]);

      // Procedural SVG Sparkline Generator
      const renderSparkline = (change = 0) => {
        const isUp = change >= 0;
        const height = 28;
        const width = 80;

        // Generate a smooth procedural curve
        let points = [];
        let curY = height / 2;
        const segments = 10;
        const stepX = width / segments;

        // Seeded random walk based on price change
        const seed = Math.abs(change);
        for (let i = 0; i <= segments; i++) {
          const x = i * stepX;
          // Trajectory trends up or down depending on change
          const trend = isUp ? -0.8 : 0.8;
          const randomFactor = Math.sin(i * 1.5 + seed) * (height * 0.25);
          const y = Math.max(2, Math.min(height - 2, curY + (trend * (height * 0.08)) + randomFactor));
          points.push(`${x},${y}`);
        }

        return (
          <svg width={width} height={height} style={{ overflow: 'visible', flexShrink: 0 }}>
            <path
              d={`M 0,${height / 2} Q ${points.join(' ')}`}
              fill="none"
              stroke={isUp ? '#22c55e' : '#ef4444'}
              strokeWidth="1.75"
              strokeLinecap="round"
              strokeLinejoin="round"
              style={{ filter: `drop-shadow(0 0 2px ${isUp ? '#22c55e' : '#ef4444'}40)` }}
            />
          </svg>
        );
      };

      return (
        <div className="space-y-6 animate-fade-in">
          {/* Header */}
          <div style={{ display: 'flex', flexWrap: 'wrap', justifyContent: 'space-between', alignItems: 'center', gap: '1rem', paddingBottom: '1.25rem', borderBottom: '1px solid rgba(31,41,55,0.6)' }}>
            <div>
              <h1 style={{ fontSize: '1.75rem', fontWeight: 900, color: '#fff', margin: 0 }}>Welcome back, {userProfile?.displayName || "Trader"}</h1>
              <p style={{ color: '#9ca3af', marginTop: '0.25rem', fontSize: '0.75rem' }}>Real-time indicators, top movers, and live market breadth dashboard.</p>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: '0.875rem', background: '#0d0d14', border: '1px solid rgba(31,41,55,0.5)', padding: '0.5rem 0.875rem', borderRadius: '0.625rem', fontSize: '0.75rem', fontWeight: 600, color: '#9ca3af' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: '0.375rem' }}>
                <Icons.Clock size={13} style={{ color: '#60a5fa' }} />
                <span>Updated: <strong style={{ color: '#fff' }}>{formattedTime}</strong></span>
              </div>
              <span style={{ color: 'rgba(31,41,55,0.5)' }}>|</span>
              <span>Sync: <strong style={{ color: '#60a5fa' }}>{countdown}s</strong></span>
              <button onClick={() => fetchMarketData(true)} disabled={isLoading} style={{ marginLeft: '0.375rem', background: '#2563eb', color: '#fff', padding: '0.25rem 0.625rem', borderRadius: '0.375rem', border: 'none', cursor: 'pointer', fontSize: '10px', fontWeight: 700 }}>Sync</button>
            </div>
          </div>

          <div className="grid grid-cols-1 grid-cols-lg-2" style={{ gap: '1.25rem' }}>
            {/* Top Gainers Card */}
            <div className="glass-panel" style={{ padding: '1.25rem', borderRadius: '0.875rem' }}>
              <h2 style={{ fontSize: '0.8rem', fontWeight: 750, textTransform: 'uppercase', letterSpacing: '0.05em', color: '#22c55e', marginBottom: '1rem', display: 'flex', alignItems: 'center', gap: '0.375rem' }}><Icons.TrendingUp size={15} /> Top Gainers (24h)</h2>
              <div className="grid grid-cols-1 grid-cols-md-3" style={{ gap: '0.75rem' }}>
                {topGainers.map(coin => (
                  <Link to={"/coin/" + coin.id} key={coin.id} className="glass-card" style={{ padding: '0.875rem', borderRadius: '0.75rem', display: 'block', transition: 'transform 0.2s', border: '1px solid rgba(34,197,94,0.1)' }} onMouseEnter={e => e.currentTarget.style.transform = 'translateY(-2px)'} onMouseLeave={e => e.currentTarget.style.transform = 'none'}>
                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '0.5rem' }}>
                      <div style={{ display: 'flex', alignItems: 'center', gap: '0.375rem' }}>
                        <img src={coin.image} alt="" style={{ width: '1.25rem', height: '1.25rem', borderRadius: '50%' }} />
                        <span style={{ fontSize: '0.75rem', fontWeight: 700, color: '#fff', textTransform: 'uppercase' }}>{coin.symbol}</span>
                      </div>
                      <span style={{ fontSize: '9px', color: '#22c55e', fontWeight: 750 }}>+{coin.price_change_percentage_24h?.toFixed(1)}%</span>
                    </div>
                    <div style={{ fontSize: '1rem', fontWeight: 800, color: '#fff', marginBottom: '0.5rem' }}>${coin.current_price?.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 5 })}</div>
                    <div style={{ display: 'flex', justifyContent: 'center' }}>
                      {renderSparkline(coin.price_change_percentage_24h)}
                    </div>
                  </Link>
                ))}
              </div>
            </div>

            {/* Top Losers Card */}
            <div className="glass-panel" style={{ padding: '1.25rem', borderRadius: '0.875rem' }}>
              <h2 style={{ fontSize: '0.8rem', fontWeight: 750, textTransform: 'uppercase', letterSpacing: '0.05em', color: '#ef4444', marginBottom: '1rem', display: 'flex', alignItems: 'center', gap: '0.375rem' }}><Icons.TrendingDown size={15} /> Top Losers (24h)</h2>
              <div className="grid grid-cols-1 grid-cols-md-3" style={{ gap: '0.75rem' }}>
                {topLosers.map(coin => (
                  <Link to={"/coin/" + coin.id} key={coin.id} className="glass-card" style={{ padding: '0.875rem', borderRadius: '0.75rem', display: 'block', transition: 'transform 0.2s', border: '1px solid rgba(239,68,68,0.1)' }} onMouseEnter={e => e.currentTarget.style.transform = 'translateY(-2px)'} onMouseLeave={e => e.currentTarget.style.transform = 'none'}>
                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '0.5rem' }}>
                      <div style={{ display: 'flex', alignItems: 'center', gap: '0.375rem' }}>
                        <img src={coin.image} alt="" style={{ width: '1.25rem', height: '1.25rem', borderRadius: '50%' }} />
                        <span style={{ fontSize: '0.75rem', fontWeight: 700, color: '#fff', textTransform: 'uppercase' }}>{coin.symbol}</span>
                      </div>
                      <span style={{ fontSize: '9px', color: '#ef4444', fontWeight: 750 }}>{coin.price_change_percentage_24h?.toFixed(1)}%</span>
                    </div>
                    <div style={{ fontSize: '1rem', fontWeight: 800, color: '#fff', marginBottom: '0.5rem' }}>${coin.current_price?.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 5 })}</div>
                    <div style={{ display: 'flex', justifyContent: 'center' }}>
                      {renderSparkline(coin.price_change_percentage_24h)}
                    </div>
                  </Link>
                ))}
              </div>
            </div>
          </div>

          {/* Double Column layout for Watchlist Preview & Sentiment Gauge */}
          <div className="grid grid-cols-1 grid-cols-lg-3" style={{ gap: '1.25rem' }}>

            {/* Watchlist Preview (Left 2 Columns) */}
            <div style={{ gridColumn: 'span 2' }} className="glass-panel" >
              <div style={{ padding: '1.25rem' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem' }}>
                  <h2 style={{ fontSize: '0.875rem', fontWeight: 750, color: '#fff', display: 'flex', alignItems: 'center', gap: '0.375rem', margin: 0 }}><Icons.Star size={15} style={{ color: '#eab308' }} /> Watchlist Monitor</h2>
                  <Link to="/watchlist" style={{ fontSize: '10px', color: '#3b82f6', fontWeight: 700, display: 'flex', alignItems: 'center', gap: '0.125rem', textDecoration: 'none' }}>Monitor Screen <Icons.ChevronRight size={13} /></Link>
                </div>
                {watchlistCoins.length === 0 ? (
                  <div style={{ padding: '3.5rem 2rem', textAlign: 'center', color: '#6b7280', fontSize: '0.75rem', border: '1px dashed rgba(31,41,55,0.5)', borderRadius: '0.75rem' }}>
                    Your watchlist monitor is empty. Explore <Link to="/market" style={{ color: '#3b82f6', textDecoration: 'underline' }}>Market</Link> to add assets.
                  </div>
                ) : (
                  <div style={{ overflowX: 'auto' }}>

    // =====================================================
    // SECTION 7: MARKET PAGE (simplified for single file)
    // =====================================================
    function Market({ coins, loading: isLoading }) {
      const { userProfile, toggleWatchlist } = useAuth();
      const [searchTerm, setSearchTerm] = useState("");
      const [filterType, setFilterType] = useState("all");
      const [currentPage, setCurrentPage] = useState(1);
      const itemsPerPage = 25;

      const filtered = useMemo(() => {
        let result = [...coins];
        if (searchTerm.trim()) { const q = searchTerm.toLowerCase(); result = result.filter(c => c.name.toLowerCase().includes(q) || c.symbol.toLowerCase().includes(q)); }
        if (filterType === "top100") result = result.filter(c => c.market_cap_rank <= 100);
        else if (filterType === "gainers") result = result.filter(c => c.price_change_percentage_24h > 0);
        else if (filterType === "losers") result = result.filter(c => c.price_change_percentage_24h < 0);
        return result;
      }, [coins, searchTerm, filterType]);

      useEffect(() => { setCurrentPage(1); }, [searchTerm, filterType]);

      const totalPages = Math.ceil(filtered.length / itemsPerPage);
      const startIndex = (currentPage - 1) * itemsPerPage;
      const paginated = filtered.slice(startIndex, startIndex + itemsPerPage);

      return (
        <div className="space-y-6">
          <div><h1 style={{ fontSize: '1.5rem', fontWeight: 900, color: '#fff', margin: 0 }}>Cryptocurrency Spot Market</h1><p style={{ color: '#9ca3af', fontSize: '0.75rem', marginTop: '0.25rem' }}>Live price listings from CoinGecko.</p></div>

          <div style={{ display: 'flex', flexWrap: 'wrap', gap: '1rem', alignItems: 'center', justifyContent: 'space-between', background: '#0d0d14', border: '1px solid #1f2937', padding: '1rem', borderRadius: '1rem' }}>
            <div style={{ position: 'relative', width: '20rem', maxWidth: '100%' }}>
              <Icons.Search style={{ position: 'absolute', left: '0.875rem', top: '0.75rem', color: '#6b7280' }} size={16} />
              <input type="text" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} placeholder="Search symbol or name..." style={{ width: '100%', background: '#141421', border: '1px solid #1f2937', borderRadius: '0.75rem', padding: '0.5rem 1rem 0.5rem 2.5rem', fontSize: '0.75rem', color: '#fff' }} />
            </div>

                <button key={tab.id} onClick={() => setFilterType(tab.id)} style={{ padding: '0.5rem 1rem', fontSize: '0.75rem', fontWeight: 600, borderRadius: '0.75rem', border: '1px solid ' + (filterType === tab.id ? '#3b82f6' : '#1f2937'), background: filterType === tab.id ? '#2563eb' : 'transparent', color: filterType === tab.id ? '#fff' : '#9ca3af', cursor: 'pointer' }}>{tab.label}</button>
              ))}
            </div>
          </div>

          <div className="glass-panel" style={{ borderRadius: '1rem', overflow: 'hidden' }}>
            <div style={{ overflowX: 'auto' }}>
              <table style={{ width: '100%', textAlign: 'left', minWidth: '800px' }}>
                <thead><tr style={{ borderBottom: '1px solid #1f2937', fontSize: '11px', fontWeight: 700, color: '#6b7280', textTransform: 'uppercase', letterSpacing: '0.05em', background: 'rgba(17,24,39,0.2)' }}>
                  <th style={{ padding: '1rem', width: '3rem', textAlign: 'center' }}>★</th><th style={{ padding: '1rem', width: '3.5rem' }}>Rank</th><th style={{ padding: '1rem' }}>Asset</th><th style={{ padding: '1rem', textAlign: 'right' }}>Price</th><th style={{ padding: '1rem', textAlign: 'right' }}>24h</th><th style={{ padding: '1rem', textAlign: 'right' }}>Volume</th><th style={{ padding: '1rem', textAlign: 'right' }}>Market Cap</th>
                </tr></thead>
                <tbody>
                  {paginated.length === 0 ? <tr><td colSpan={7} style={{ padding: '2rem', textAlign: 'center', color: '#6b7280', fontSize: '0.875rem' }}>No matching cryptocurrencies found.</td></tr> :
                    paginated.map(coin => {
                      const isW = userProfile?.watchlist?.includes(coin.id);
                      const isG = coin.price_change_percentage_24h >= 0;
                      return (
                        <tr key={coin.id} className={coin.flashClass || ""} style={{ borderBottom: '1px solid rgba(31,41,55,0.5)', fontSize: '0.875rem', fontWeight: 500 }}>
                          <td style={{ padding: '1rem', textAlign: 'center' }}><button onClick={() => toggleWatchlist(coin.id)} style={{ background: 'transparent', border: 'none', cursor: 'pointer', color: isW ? '#eab308' : '#374151' }}><Icons.Star size={16} fill={isW ? '#eab308' : 'none'} /></button></td>
                          <td style={{ padding: '1rem', color: '#6b7280', textAlign: 'center', fontWeight: 700 }}>{coin.market_cap_rank}</td>
                          <td style={{ padding: '1rem' }}><Link to={"/coin/" + coin.id} style={{ display: 'flex', alignItems: 'center', gap: '0.75rem' }}><img src={coin.image} alt={coin.name} style={{ width: '1.5rem', height: '1.5rem', borderRadius: '9999px' }} /><div><span style={{ color: '#fff', fontWeight: 700, display: 'block', lineHeight: 1 }}>{coin.name}</span><span style={{ fontSize: '10px', color: '#6b7280', textTransform: 'uppercase', display: 'block', marginTop: '0.125rem' }}>{coin.symbol}</span></div></Link></td>
                          <td style={{ padding: '1rem', textAlign: 'right', fontWeight: 600, color: '#fff' }}>${coin.current_price?.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 6 })}</td>
                          <td style={{ padding: '1rem', textAlign: 'right', fontWeight: 700, color: isG ? '#22c55e' : '#ef4444' }}>{isG ? "▲" : "▼"} {Math.abs(coin.price_change_percentage_24h || 0).toFixed(2)}%</td>
                          <td style={{ padding: '1rem', textAlign: 'right', color: '#d1d5db', fontWeight: 600 }}>${coin.total_volume?.toLocaleString()}</td>
                          <td style={{ padding: '1rem', textAlign: 'right', color: '#d1d5db', fontWeight: 600 }}>${coin.market_cap?.toLocaleString()}</td>

            </div>
            {totalPages > 1 && (
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '1rem 1.5rem', background: 'rgba(17,24,39,0.2)', borderTop: '1px solid #1f2937' }}>
                <span style={{ fontSize: '0.75rem', color: '#6b7280', fontWeight: 600 }}>Showing <strong style={{ color: '#d1d5db' }}>{startIndex + 1}</strong> to <strong style={{ color: '#d1d5db' }}>{Math.min(startIndex + itemsPerPage, filtered.length)}</strong> of <strong style={{ color: '#d1d5db' }}>{filtered.length}</strong></span>
                <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                  <button onClick={() => setCurrentPage(p => Math.max(p - 1, 1))} disabled={currentPage === 1} style={{ padding: '0.5rem', background: '#111827', border: '1px solid #1f2937', color: '#9ca3af', borderRadius: '0.5rem', cursor: 'pointer' }}><Icons.ChevronLeft size={16} /></button>
                  <span style={{ fontSize: '0.75rem', fontWeight: 700, color: '#60a5fa', padding: '0.25rem 0.75rem', background: 'rgba(37,99,235,0.1)', borderRadius: '0.5rem' }}>Page {currentPage} of {totalPages}</span>
                  <button onClick={() => setCurrentPage(p => Math.min(p + 1, totalPages))} disabled={currentPage === totalPages} style={{ padding: '0.5rem', background: '#111827', border: '1px solid #1f2937', color: '#9ca3af', borderRadius: '0.5rem', cursor: 'pointer' }}><Icons.ChevronRight size={16} /></button>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // =====================================================
    // SECTION 8: COIN DETAIL PAGE (Chart + Stats)
    // =====================================================
    function CoinDetail({ coins }) {
      const { id } = useParams();
      const { userProfile, toggleWatchlist } = useAuth();
      const coin = coins.find(c => c.id === id || c.symbol.toLowerCase() === id.toLowerCase());
      const isWatched = userProfile?.watchlist?.includes(coin?.id);
      const [days, setDays] = useState("30");
      const [chartData, setChartData] = useState([]);
      const [loadingChart, setLoadingChart] = useState(true);

      const fetchChartData = async () => {
        if (!coin) return;
        setLoadingChart(true);
        try {
          const res = await fetch(`https://api.coingecko.com/api/v3/coins/${coin.id}/market_chart?vs_currency=usd&days=${days}`);
          const data = await res.json();
          if (data.prices) { setChartData(data.prices.map(p => ({ time: p[0], price: p[1] }))); }
        } catch (err) {
          const dataPoints = days === "7" ? 50 : days === "30" ? 100 : 150;
          const walk = []; let base = coin.current_price * 0.9; const step = coin.current_price * 0.008;
          for (let i = 0; i < dataPoints; i++) { const time = Date.now() - (dataPoints - i) * (parseInt(days) * 86400000 / dataPoints); base = base + (Math.random() - 0.47) * step; walk.push({ time, price: Math.max(0, base) }); }
          walk[walk.length - 1] = { time: Date.now(), price: coin.current_price };
          setChartData(walk);
        } finally { setLoadingChart(false); }
      };

      useEffect(() => { if (coin) fetchChartData(); }, [coin, days]);

      if (!coin) return <div style={{ textAlign: 'center', color: '#6b7280', paddingTop: '3rem' }}><p style={{ fontWeight: 700, fontSize: '0.875rem' }}>Asset not found.</p><Link to="/market" style={{ color: '#3b82f6', textDecoration: 'underline', fontSize: '0.75rem' }}>Return to Market</Link></div>;

      const isGainer = coin.price_change_percentage_24h >= 0;
      const CustomTooltip = ({ active, payload }) => {
        if (active && payload && payload.length) return <div style={{ background: '#0f0f18', border: '1px solid #1f2937', padding: '0.625rem', borderRadius: '0.5rem', fontSize: '0.75rem', fontWeight: 600 }}><p style={{ color: '#9ca3af', margin: 0 }}>{new Date(payload[0].payload.time).toLocaleString()}</p><p style={{ color: '#60a5fa', margin: '0.25rem 0 0', fontWeight: 700 }}>${payload[0].value?.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 4 })}</p></div>;
        return null;
      };

      return (
        <div className="space-y-6">
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', paddingBottom: '1rem', borderBottom: '1px solid #1f2937' }}>
            <Link to="/market" style={{ display: 'flex', alignItems: 'center', gap: '0.375rem', fontSize: '0.75rem', color: '#9ca3af', fontWeight: 600 }}><Icons.ArrowLeft size={16} /> Spot Markets</Link>
            <button onClick={() => toggleWatchlist(coin.id)} style={{ display: 'flex', alignItems: 'center', gap: '0.375rem', padding: '0.5rem 1rem', border: '1px solid ' + (isWatched ? '#eab308' : '#1f2937'), borderRadius: '0.75rem', fontSize: '0.75rem', fontWeight: 700, background: isWatched ? 'rgba(234,179,8,0.1)' : 'transparent', color: isWatched ? '#eab308' : '#9ca3af', cursor: 'pointer' }}>
              <Icons.Star size={14} fill={isWatched ? '#eab308' : 'none'} /> {isWatched ? "On Watchlist" : "Add to Watchlist"}
            </button>
          </div>

          <div style={{ display: 'flex', flexWrap: 'wrap', justifyContent: 'space-between', alignItems: 'flex-start', gap: '1rem', background: '#0d0d14', border: '1px solid #1f2937', padding: '1.5rem', borderRadius: '1rem' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: '1rem' }}>
              <img src={coin.image} alt={coin.name} style={{ width: '3.5rem', height: '3.5rem', borderRadius: '9999px' }} />
              <div>
                <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}><h1 style={{ fontSize: '1.5rem', fontWeight: 900, color: '#fff', margin: 0 }}>{coin.name}</h1><span style={{ fontSize: '10px', color: '#6b7280', textTransform: 'uppercase', fontWeight: 900, background: '#111827', border: '1px solid #1f2937', padding: '0.125rem 0.5rem', borderRadius: '0.25rem' }}>{coin.symbol}</span></div>
                <span style={{ fontSize: '0.75rem', color: '#6b7280', fontWeight: 600 }}>Market Cap Rank: <strong style={{ color: '#fff' }}>#{coin.market_cap_rank}</strong></span>
              </div>
            </div>
            <div style={{ textAlign: 'right' }}>
              <div style={{ fontSize: '1.875rem', fontWeight: 800, color: '#fff' }}>${coin.current_price?.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 6 })}</div>
              <div style={{ fontSize: '0.875rem', fontWeight: 700, marginTop: '0.375rem', display: 'flex', alignItems: 'center', justifyContent: 'flex-end', gap: '0.25rem', color: isGainer ? '#22c55e' : '#ef4444' }}>
                {isGainer ? <Icons.TrendingUp size={16} /> : <Icons.TrendingDown size={16} />}
                <span>{isGainer ? "+" : ""}{coin.price_change_percentage_24h?.toFixed(2)}%</span>
              </div>
            </div>
          </div>

          {/* Chart */}
          <div className="glass-panel" style={{ padding: '1.5rem', borderRadius: '1rem' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem' }}>
              <h2 style={{ fontSize: '0.875rem', fontWeight: 700, color: '#fff', textTransform: 'uppercase', letterSpacing: '0.05em', margin: 0 }}>Historical Trend</h2>
              <div style={{ display: 'flex', background: 'rgba(17,24,39,0.4)', padding: '0.25rem', border: '1px solid rgba(31,41,55,0.5)', borderRadius: '0.75rem', gap: '0.25rem' }}>
                {[{ id: "7", label: "7D" }, { id: "30", label: "30D" }, { id: "90", label: "90D" }, { id: "365", label: "1Y" }].map(tf => (
                  <button key={tf.id} onClick={() => setDays(tf.id)} style={{ padding: '0.25rem 0.75rem', fontSize: '10px', fontWeight: 700, borderRadius: '0.5rem', border: 'none', cursor: 'pointer', background: days === tf.id ? '#2563eb' : 'transparent', color: days === tf.id ? '#fff' : '#6b7280' }}>{tf.label}</button>
                ))}
              </div>
            </div>
            <div style={{ width: '100%', height: '320px' }}>
              {loadingChart ? <CardSkeleton /> :
                <ResponsiveContainer width="100%" height="100%">
                  <AreaChart data={chartData} margin={{ top: 10, right: 10, left: -20, bottom: 0 }}>
                    <defs><linearGradient id="priceGradient" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#3b82f6" stopOpacity={0.35} /><stop offset="95%" stopColor="#3b82f6" stopOpacity={0.0} /></linearGradient></defs>
                    <CartesianGrid strokeDasharray="3 3" stroke="#1f2937" vertical={false} />
                    <XAxis dataKey="time" tickFormatter={v => new Date(v).toLocaleDateString(undefined, { month: "short", day: "numeric" })} stroke="#4b5563" fontSize={10} tickLine={false} />
                    <YAxis stroke="#4b5563" fontSize={10} tickLine={false} domain={["auto", "auto"]} tickFormatter={v => `$${v?.toLocaleString(undefined, { maximumFractionDigits: 2 })}`} />
                    <Tooltip content={<CustomTooltip />} />
                    <Area type="monotone" dataKey="price" stroke="#3b82f6" strokeWidth={2} fillOpacity={1} fill="url(#priceGradient)" />
                  </AreaChart>
                </ResponsiveContainer>
              }
            </div>
          </div>

          {/* Tokenomics */}
          <div className="glass-panel" style={{ padding: '1.5rem', borderRadius: '1rem' }}>
            <h2 style={{ fontSize: '0.875rem', fontWeight: 700, color: '#fff', textTransform: 'uppercase', margin: '0 0 1rem' }}>Tokenomics & Metrics</h2>
            <div className="grid grid-cols-2 grid-cols-md-4" style={{ gap: '1rem' }}>
              {[{ label: "All-Time High", val: "$" + (coin.ath?.toLocaleString() || "N/A"), sub: (coin.ath_change_percentage?.toFixed(2) || 0) + "% from ATH", subColor: '#ef4444' },
              { label: "All-Time Low", val: "$" + (coin.atl?.toLocaleString() || "N/A"), sub: "+" + (coin.atl_change_percentage?.toFixed(2) || 0) + "% from ATL", subColor: '#22c55e' },
              { label: "Circulating Supply", val: coin.circulating_supply?.toLocaleString() || "N/A", sub: "Max: " + (coin.max_supply?.toLocaleString() || "Unlimited"), subColor: '#6b7280' },
              { label: "Fully Diluted Val.", val: "$" + (coin.fully_diluted_valuation?.toLocaleString() || "N/A"), sub: "24h vol: $" + (coin.total_volume?.toLocaleString()), subColor: '#6b7280' }
              ].map((m, i) => (
                <div key={i} style={{ background: 'rgba(17,24,39,0.4)', border: '1px solid rgba(31,41,55,0.5)', padding: '1rem', borderRadius: '0.75rem' }}>
                  <span style={{ color: '#6b7280', display: 'block', textTransform: 'uppercase', fontSize: '10px' }}>{m.label}</span>
                  <strong style={{ color: '#fff', display: 'block', marginTop: '0.25rem', fontSize: '0.875rem' }}>{m.val}</strong>
                  <span style={{ color: m.subColor, fontSize: '10px', marginTop: '0.125rem', display: 'block' }}>{m.sub}</span>
                </div>
              ))}
            </div>
          </div>
          <footer style={{ paddingTop: '1.5rem', borderTop: '1px solid #111827', textAlign: 'center', fontSize: '0.75rem', color: '#4b5563', fontWeight: 500 }}>🛡️ AI-generated analysis, not financial advice.</footer>
        </div>
      );
    }

    // =====================================================
    function Watchlist({ coins, loading: isLoading }) {
      const { userProfile, toggleWatchlist } = useAuth();
      const watchedCoins = useMemo(() => coins.filter(c => userProfile?.watchlist?.includes(c.id)), [coins, userProfile?.watchlist]);

      return (
        <div className="space-y-6">
          <div><h1 style={{ fontSize: '1.5rem', fontWeight: 900, color: '#fff', margin: 0 }}>Your Crypto Watchlist</h1><p style={{ color: '#9ca3af', fontSize: '0.75rem', marginTop: '0.25rem' }}>Tracked assets and quick analysis links.</p></div>
          <div className="glass-panel" style={{ borderRadius: '1rem', overflow: 'hidden' }}>
            <div style={{ overflowX: 'auto' }}>
              <table style={{ width: '100%', textAlign: 'left', minWidth: '700px' }}>
                <thead><tr style={{ borderBottom: '1px solid #1f2937', fontSize: '11px', fontWeight: 700, color: '#6b7280', textTransform: 'uppercase', background: 'rgba(17,24,39,0.2)' }}><th style={{ padding: '1rem', width: '4rem', textAlign: 'center' }}>Remove</th><th style={{ padding: '1rem' }}>Asset</th><th style={{ padding: '1rem', textAlign: 'right' }}>Price</th><th style={{ padding: '1rem', textAlign: 'right' }}>24h</th><th style={{ padding: '1rem', textAlign: 'right' }}>Market Cap</th><th style={{ padding: '1rem', textAlign: 'center' }}>View</th></tr></thead>
                <tbody>
                  {watchedCoins.length === 0 ? <tr><td colSpan={6} style={{ padding: '3rem', textAlign: 'center', color: '#6b7280', fontSize: '0.875rem' }}>Watchlist is empty. <Link to="/market" style={{ color: '#3b82f6' }}>Browse Markets</Link></td></tr> :
                    watchedCoins.map(coin => {
                      const isG = coin.price_change_percentage_24h >= 0;
                      return (
                        <tr key={coin.id} style={{ borderBottom: '1px solid rgba(31,41,55,0.5)', fontSize: '0.875rem', fontWeight: 500 }}>
                          <td style={{ padding: '1rem', textAlign: 'center' }}><button onClick={() => toggleWatchlist(coin.id)} style={{ background: 'transparent', border: 'none', color: '#6b7280', cursor: 'pointer' }}><Icons.Trash2 size={16} /></button></td>
                          <td style={{ padding: '1rem' }}><Link to={"/coin/" + coin.id} style={{ display: 'flex', alignItems: 'center', gap: '0.75rem' }}><img src={coin.image} alt={coin.name} style={{ width: '1.5rem', height: '1.5rem', borderRadius: '9999px' }} /><div><span style={{ color: '#fff', fontWeight: 700, display: 'block' }}>{coin.name}</span><span style={{ fontSize: '10px', color: '#6b7280', textTransform: 'uppercase' }}>{coin.symbol}</span></div></Link></td>
                          <td style={{ padding: '1rem', textAlign: 'right', fontWeight: 600, color: '#fff' }}>${coin.current_price?.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 6 })}</td>
                          <td style={{ padding: '1rem', textAlign: 'right', fontWeight: 700, color: isG ? '#22c55e' : '#ef4444' }}>{isG ? "▲" : "▼"} {Math.abs(coin.price_change_percentage_24h || 0).toFixed(2)}%</td>
                          <td style={{ padding: '1rem', textAlign: 'right', color: '#d1d5db', fontWeight: 600 }}>${coin.market_cap?.toLocaleString()}</td>
                          <td style={{ padding: '1rem', textAlign: 'center' }}><Link to={"/coin/" + coin.id} style={{ display: 'inline-flex', alignItems: 'center', gap: '0.25rem', padding: '0.25rem 0.75rem', background: 'rgba(37,99,235,0.1)', color: '#60a5fa', borderRadius: '0.5rem', fontSize: '0.75rem', fontWeight: 600 }}>AI View <Icons.ArrowUpRight size={12} /></Link></td>
                        </tr>
                      );
                    })}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    }

    // =====================================================
    // SECTION 10: PORTFOLIO PAGE (Simplified)
    // =====================================================
    function Portfolio({ coins }) {
      const { userProfile, updatePortfolio } = useAuth();
      const [selectedCoinId, setSelectedCoinId] = useState("");
      const [amount, setAmount] = useState("");
      const [buyPrice, setBuyPrice] = useState("");
      const [hoveredIdx, setHoveredIdx] = useState(null);

      useEffect(() => {
        if (coins.length > 0 && !selectedCoinId) {
          setSelectedCoinId(coins[0].id);
          setBuyPrice(coins[0].current_price.toString());
        }
      }, [coins]);

      const portfolioItems = useMemo(() => {
        return (userProfile?.portfolio || []).map(item => {
          const live = coins.find(c => c.id === item.coinId);
          const cp = live ? live.current_price : parseFloat(item.buyPrice);
          const val = parseFloat(item.amount) * cp;
          const cost = parseFloat(item.amount) * parseFloat(item.buyPrice);
          return {
            ...item,
            name: live?.name || item.coinId,
            symbol: live?.symbol || "",
            image: live?.image || "",
            currentPrice: cp,
            currentValuation: val,
            costBasis: cost,
            pnlUsd: val - cost,
            pnlPercent: cost > 0 ? ((val - cost) / cost) * 100 : 0
          };
        });
      }, [userProfile?.portfolio, coins]);

      const totals = useMemo(() => {
        let inv = 0, val = 0;
        portfolioItems.forEach(i => {
          inv += i.costBasis;
          val += i.currentValuation;
        });
        return {
          inv,
          val,
          pnl: val - inv,
          pct: inv > 0 ? ((val - inv) / inv) * 100 : 0
        };
      }, [portfolioItems]);

      const handleAdd = async (e) => {
        e.preventDefault();
        if (!selectedCoinId || !amount || !buyPrice) return;
        const newH = {
          id: "hold_" + Math.random().toString(36).substring(2, 9),
          coinId: selectedCoinId,
          amount: parseFloat(amount),
          buyPrice: parseFloat(buyPrice),
          addedAt: new Date().toISOString()
        };
        await updatePortfolio([...(userProfile?.portfolio || []), newH]);
        setAmount("");
      };

      const handleDelete = async (id) => {
        await updatePortfolio((userProfile?.portfolio || []).filter(i => i.id !== id));
      };

      // Aggregate allocations for donut chart
      const chartData = useMemo(() => {
        if (totals.val === 0) return [];

        // Group holdings by asset
        const grouped = {};
        portfolioItems.forEach(item => {
          if (!grouped[item.coinId]) {
            grouped[item.coinId] = {
              name: item.name,
              symbol: item.symbol.toUpperCase(),
              value: 0,
            };
          }
          grouped[item.coinId].value += item.currentValuation;
        });

        // Convert to array and calculate %
        const colors = ['#6366f1', '#10b981', '#f59e0b', '#3b82f6', '#ec4899', '#8b5cf6', '#14b8a6', '#ef4444'];
        return Object.keys(grouped).map((key, index) => {
          const item = grouped[key];
          const percent = (item.value / totals.val) * 100;
          return {
            ...item,
            percent,
            color: colors[index % colors.length]
          };
        }).sort((a, b) => b.value - a.value);
      }, [portfolioItems, totals.val]);

      // SVG Donut slice calculation helpers
      const donutRadius = 38;
      const donutCircumference = 2 * Math.PI * donutRadius; // ~238.76

      let accumulatedPercentage = 0;

      const selectStyle = { width: '100%', background: '#141421', border: '1px solid #1f2937', borderRadius: '0.75rem', padding: '0.5rem 0.75rem', fontSize: '0.75rem', color: '#fff' };
      const inputStyle = { width: '100%', background: '#141421', border: '1px solid #1f2937', borderRadius: '0.75rem', padding: '0.5rem 0.75rem', fontSize: '0.75rem', color: '#fff' };

      return (
        <div className="space-y-6">
          <div>
            <h1 style={{ fontSize: '1.5rem', fontWeight: 900, color: '#fff', margin: 0 }}>Portfolio Simulator</h1>
            <p style={{ color: '#9ca3af', fontSize: '0.75rem', marginTop: '0.25rem' }}>Track holdings, distribution weights, and simulated performance indicators.</p>
          </div>

          {/* Metrics summary cards */}
          <div className="grid grid-cols-2 grid-cols-md-4" style={{ gap: '1rem' }}>
            {[
              { label: "Net Portfolio Value", val: "$" + totals.val.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }), color: '#fff', desc: "Total asset value" },
              { label: "Total Invested", val: "$" + totals.inv.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }), color: '#9ca3af', desc: "Cost basis basis" },
              { label: "Net Profit / Loss", val: (totals.pnl >= 0 ? "+" : "") + "$" + totals.pnl.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }), color: totals.pnl >= 0 ? '#22c55e' : '#ef4444', desc: "Net returns" },
              { label: "Total return (%)", val: (totals.pnl >= 0 ? "▲" : "▼") + " " + Math.abs(totals.pct).toFixed(2) + "%", color: totals.pnl >= 0 ? '#22c55e' : '#ef4444', desc: "Simulated ROI" }
            ].map((m, i) => (
              <div key={i} className="glass-panel" style={{ padding: '1rem 1.25rem', borderRadius: '0.875rem', borderLeft: '3px solid ' + (i === 2 || i === 3 ? m.color : '#4b5563') }}>
                <span style={{ fontSize: '9px', fontWeight: 700, color: '#6b7280', textTransform: 'uppercase', letterSpacing: '0.05em', display: 'block' }}>{m.label}</span>
                <span style={{ fontSize: '1.15rem', fontWeight: 800, color: m.color, marginTop: '0.25rem', display: 'block' }}>{m.val}</span>
                <span style={{ fontSize: '9px', color: '#374151', display: 'block', marginTop: '0.125rem' }}>{m.desc}</span>
              </div>
            ))}
          </div>

          <div className="grid grid-cols-1 grid-cols-lg-3" style={{ gap: '1.25rem' }}>

            {/* Holdings & SVG Donut Chart */}
            <div style={{ gridColumn: 'span 2' }} className="space-y-4">

              {/* Asset Allocation Chart Visualizer */}
              {chartData.length > 0 && (
                <div className="glass-panel" style={{ padding: '1.25rem', borderRadius: '0.875rem', display: 'flex', gap: '1.5rem', alignItems: 'center', flexWrap: 'wrap' }}>
                  <div style={{ position: 'relative', width: '7rem', height: '7rem', flexShrink: 0, margin: '0 auto' }}>
                    <svg viewBox="0 0 100 100" style={{ transform: 'rotate(-90deg)', width: '100%', height: '100%' }}>
                      <circle cx="50" cy="50" r={donutRadius} fill="transparent" stroke="rgba(255,255,255,0.03)" strokeWidth="12" />
                      {chartData.map((slice, index) => {
                        const dashOffset = donutCircumference - (donutCircumference * slice.percent) / 100;
                        const rotation = (accumulatedPercentage * donutCircumference) / 100;
                        accumulatedPercentage += slice.percent;
                        const isHovered = hoveredIdx === index;

                        return (
                          <circle
                            key={slice.name}
                            cx="50"
                            cy="50"
                            r={donutRadius}
                            fill="transparent"
                            stroke={slice.color}
                            strokeWidth={isHovered ? '14' : '11'}
                            strokeDasharray={`${(donutCircumference * slice.percent) / 100} ${donutCircumference}`}
                            strokeDashoffset={-rotation}
                            style={{ transition: 'stroke-width 0.2s ease, filter 0.2s ease', filter: isHovered ? 'drop-shadow(0 0 4px ' + slice.color + '40)' : 'none', cursor: 'pointer' }}
                            onMouseEnter={() => setHoveredIdx(index)}
                            onMouseLeave={() => setHoveredIdx(null)}
                          />
                        );
                      })}
                    </svg>

                    {/* Centered Donut Label */}
                    <div style={{ position: 'absolute', top: 0, left: 0, right: 0, bottom: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', pointerEvents: 'none' }}>
                      <span style={{ fontSize: '9px', fontWeight: 700, color: '#6b7280', textTransform: 'uppercase' }}>
                        {hoveredIdx !== null ? chartData[hoveredIdx].symbol : 'HOLDINGS'}
                      </span>
                      <span style={{ fontSize: '0.85rem', fontWeight: 800, color: '#fff', marginTop: '1px' }}>
                        {hoveredIdx !== null
                          ? chartData[hoveredIdx].percent.toFixed(0) + '%'
                          : chartData.length + ' Coins'}
                      </span>
                    </div>
                  </div>

                  {/* Allocation Legends */}
                  <div style={{ flex: 1, minWidth: '12rem', display: 'flex', flexWrap: 'wrap', gap: '0.75rem' }}>
                    {chartData.map((slice, index) => (
                      <div
                        key={slice.name}
                        style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', padding: '0.375rem 0.625rem', background: hoveredIdx === index ? 'rgba(255,255,255,0.03)' : 'transparent', border: '1px solid ' + (hoveredIdx === index ? slice.color + '30' : 'transparent'), borderRadius: '0.5rem', cursor: 'pointer', transition: 'all 0.15s' }}
                        onMouseEnter={() => setHoveredIdx(index)}
                        onMouseLeave={() => setHoveredIdx(null)}
                      >
                        <span style={{ width: '8px', height: '8px', borderRadius: '50%', background: slice.color, display: 'inline-block' }} />
                        <span style={{ fontSize: '11px', fontWeight: 700, color: '#e2e8f0' }}>{slice.symbol}</span>
                        <span style={{ fontSize: '11px', color: '#6b7280' }}>({slice.percent.toFixed(1)}%)</span>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* Holdings table list */}
              <div className="glass-panel" style={{ padding: '1.25rem', borderRadius: '0.875rem' }}>
                <h2 style={{ fontSize: '0.875rem', fontWeight: 700, color: '#fff', margin: '0 0 1rem', display: 'flex', alignItems: 'center', gap: '0.375rem' }}>
                  <Icons.PieChart size={15} style={{ color: '#6366f1' }} /> Holding Breakdown
                </h2>
                {portfolioItems.length === 0 ? (
                  <div style={{ padding: '3.5rem', textAlign: 'center', color: '#4b5563', fontSize: '0.75rem', border: '1px dashed rgba(31,41,55,0.5)', borderRadius: '0.75rem' }}>
                    No recorded holdings. Use the panel on the right to simulate purchases.
                  </div>
                ) : (
                  <div style={{ overflowX: 'auto' }}>
                    <table style={{ width: '100%', textAlign: 'left', borderCollapse: 'collapse' }}>
                      <thead>
                        <tr style={{ borderBottom: '1px solid rgba(31,41,55,0.6)', fontSize: '9px', textTransform: 'uppercase', fontWeight: 700, color: '#6b7280' }}>
                          <th style={{ paddingBottom: '0.625rem' }}>Asset</th>
                          <th style={{ paddingBottom: '0.625rem', textAlign: 'right' }}>Holdings</th>
                          <th style={{ paddingBottom: '0.625rem', textAlign: 'right' }}>Avg Price</th>
                          <th style={{ paddingBottom: '0.625rem', textAlign: 'right' }}>Live Price</th>
                          <th style={{ paddingBottom: '0.625rem', textAlign: 'right' }}>Total Value</th>
                          <th style={{ paddingBottom: '0.625rem', textAlign: 'right' }}>Profit / Loss</th>
                          <th style={{ paddingBottom: '0.625rem', textAlign: 'center' }}>Action</th>
                        </tr>
                      </thead>
                      <tbody>
                        {portfolioItems.map(item => {
                          const isPositive = item.pnlUsd >= 0;
                          return (
                            <tr key={item.id} style={{ borderBottom: '1px solid rgba(31,41,55,0.3)', fontSize: '0.75rem', fontWeight: 600 }}>
                              <td style={{ padding: '0.625rem 0', display: 'flex', alignItems: 'center', gap: '0.375rem' }}>
                                {item.image && <img src={item.image} alt="" style={{ width: '1.25rem', height: '1.25rem', borderRadius: '50%' }} />}
                                <span style={{ color: '#fff', fontWeight: 700 }}>{item.name}</span>
                                <span style={{ fontSize: '9px', color: '#6b7280', textTransform: 'uppercase' }}>{item.symbol}</span>
                              </td>
                              <td style={{ padding: '0.625rem 0', textAlign: 'right', color: '#fff' }}>{item.amount}</td>
                              <td style={{ padding: '0.625rem 0', textAlign: 'right', color: '#9ca3af' }}>${parseFloat(item.buyPrice).toLocaleString(undefined, { maximumFractionDigits: 6 })}</td>
                              <td style={{ padding: '0.625rem 0', textAlign: 'right', color: '#fff' }}>${item.currentPrice?.toLocaleString(undefined, { maximumFractionDigits: 6 })}</td>
                              <td style={{ padding: '0.625rem 0', textAlign: 'right', color: '#fff', fontWeight: 700 }}>${item.currentValuation?.toLocaleString(undefined, { maximumFractionDigits: 2 })}</td>
                              <td style={{ padding: '0.625rem 0', textAlign: 'right', fontWeight: 700, color: isPositive ? '#22c55e' : '#ef4444' }}>
                                {isPositive ? "+" : ""}${item.pnlUsd?.toLocaleString(undefined, { maximumFractionDigits: 2 })}
                                <span style={{ display: 'block', fontSize: '9px', fontWeight: 600 }}>
                                  ({isPositive ? "▲" : "▼"} {Math.abs(item.pnlPercent).toFixed(1)}%)
                                </span>
                              </td>
                              <td style={{ padding: '0.625rem 0', textAlign: 'center' }}>
                                <button onClick={() => handleDelete(item.id)} style={{ background: 'transparent', border: 'none', color: '#4b5563', cursor: 'pointer', transition: 'color 0.15s' }} onMouseEnter={e => e.currentTarget.style.color = '#ef4444'} onMouseLeave={e => e.currentTarget.style.color = '#4b5563'} title="Remove holding">
                                  <Icons.Trash2 size={13} />
                                </button>
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                )}
              </div>
            </div>

            {/* Form Column */}
            <div style={{ gridColumn: 'span 1' }}>
              <form onSubmit={handleAdd} className="glass-panel animate-glow" style={{ padding: '1.25rem', borderRadius: '0.875rem' }}>
                <h2 style={{ fontSize: '0.875rem', fontWeight: 700, color: '#fff', display: 'flex', alignItems: 'center', gap: '0.375rem', margin: '0 0 1rem', borderBottom: '1px solid rgba(31,41,55,0.6)', paddingBottom: '0.5rem' }}>
                  <Icons.Plus size={15} style={{ color: '#3b82f6' }} /> Record Purchase
                </h2>
                <div className="space-y-3.5">
                  <div>
                    <label style={{ fontSize: '9px', color: '#6b7280', fontWeight: 700, textTransform: 'uppercase', display: 'block', marginBottom: '0.25rem' }}>Select Asset</label>
                    <select
                      value={selectedCoinId}
                      onChange={e => {
                        setSelectedCoinId(e.target.value);
                        const c = coins.find(x => x.id === e.target.value);
                        if (c) setBuyPrice(c.current_price.toString());
                      }}
                      style={selectStyle}
                    >
                      {coins.map(c => <option key={c.id} value={c.id}>{c.name} ({c.symbol.toUpperCase()})</option>)}
                    </select>
                  </div>
                  <div>
                    <label style={{ fontSize: '9px', color: '#6b7280', fontWeight: 700, textTransform: 'uppercase', display: 'block', marginBottom: '0.25rem' }}>Amount Purchased</label>
                    <input type="number" step="any" required value={amount} onChange={e => setAmount(e.target.value)} placeholder="e.g. 0.25" style={inputStyle} />
                  </div>
                  <div>
                    <label style={{ fontSize: '9px', color: '#6b7280', fontWeight: 700, textTransform: 'uppercase', display: 'block', marginBottom: '0.25rem' }}>Buy Price (USD)</label>
                    <input type="number" step="any" required value={buyPrice} onChange={e => setBuyPrice(e.target.value)} style={inputStyle} />
                  </div>

                  <button type="submit" style={{ width: '100%', background: 'linear-gradient(135deg, #2563eb, #3b82f6)', color: '#fff', fontWeight: 700, padding: '0.55rem', borderRadius: '0.75rem', border: 'none', cursor: 'pointer', fontSize: '0.75rem', marginTop: '0.5rem', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '0.25rem' }}>
                    <Icons.PlusCircle size={13} /> Add Position
                  </button>
                </div>
              </form>
            </div>

          </div>
        </div>
      );
    }

    // =====================================================
    // SECTION 11: ALERT MANAGER (Simplified)
    // =====================================================
    function AlertManager({ coins }) {
      const { userProfile, addAlert, toggleAlert, deleteAlert } = useAuth();
      const [selectedCoinId, setSelectedCoinId] = useState("");
      const [threshold, setThreshold] = useState("");
      const [direction, setDirection] = useState("above");
      const [msg, setMsg] = useState("");

      useEffect(() => { if (coins.length > 0 && !selectedCoinId) { setSelectedCoinId(coins[0].id); setThreshold(coins[0].current_price.toString()); } }, [coins]);

      const handleCreate = async (e) => { e.preventDefault(); if (!selectedCoinId || !threshold) return; const coin = coins.find(c => c.id === selectedCoinId); if (!coin) return; await addAlert({ coinId: selectedCoinId, coinName: coin.name, coinSymbol: coin.symbol, threshold: parseFloat(threshold), type: direction }); setMsg("Alert created for " + coin.name + "!"); setThreshold(""); setTimeout(() => setMsg(""), 3000); };
      const inputStyle = { width: '100%', background: '#141421', border: '1px solid #1f2937', borderRadius: '0.75rem', padding: '0.5rem 0.75rem', fontSize: '0.75rem', color: '#fff' };

      return (
        <div className="space-y-6">
          <div><h1 style={{ fontSize: '1.5rem', fontWeight: 900, color: '#fff', margin: 0 }}>Alert Manager</h1><p style={{ color: '#9ca3af', fontSize: '0.75rem', marginTop: '0.25rem' }}>Configure price alert conditions.</p></div>
          {msg && <div style={{ padding: '0.75rem', borderRadius: '0.5rem', background: 'rgba(30,120,30,0.15)', border: '1px solid rgba(30,120,30,0.25)', color: '#4ade80', fontSize: '0.875rem', display: 'flex', alignItems: 'center', gap: '0.5rem' }}><Icons.CheckCircle2 size={16} />{msg}</div>}

          <div className="grid grid-cols-1 grid-cols-lg-3" style={{ gap: '1.5rem' }}>
            <form onSubmit={handleCreate} className="glass-panel" style={{ padding: '1.5rem', borderRadius: '1rem' }}>
              <h2 style={{ fontSize: '0.875rem', fontWeight: 700, color: '#fff', display: 'flex', alignItems: 'center', gap: '0.375rem', margin: '0 0 1rem', paddingBottom: '0.75rem', borderBottom: '1px solid rgba(31,41,55,0.5)' }}><Icons.Bell size={16} style={{ color: '#3b82f6' }} /> Create Price Alert</h2>
              <div className="space-y-3">
                <div><label style={{ fontSize: '10px', color: '#6b7280', fontWeight: 700, textTransform: 'uppercase', display: 'block', marginBottom: '0.25rem' }}>Select Coin</label><select value={selectedCoinId} onChange={e => { setSelectedCoinId(e.target.value); const c = coins.find(x => x.id === e.target.value); if (c) setThreshold(c.current_price.toString()); }} style={inputStyle}>{coins.map(c => <option key={c.id} value={c.id}>{c.name} ({c.symbol.toUpperCase()})</option>)}</select></div>

    function formatTimeAgo(ts) {
      const diff = Date.now() - ts * 1000;
      if (diff < 60000) return 'Just now';
      if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
      if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
      return Math.floor(diff / 86400000) + 'd ago';
    }

    function formatCountdown(targetDate) {
      const diff = targetDate - Date.now();
      if (diff <= 0) return 'Past';
      const days = Math.floor(diff / 86400000);
      const hours = Math.floor((diff % 86400000) / 3600000);
      const years = Math.floor(days / 365);
      const months = Math.floor((days % 365) / 30);
      if (years > 0) return years + 'y ' + months + 'mo';
      if (months > 0) return months + 'mo ' + (days % 30) + 'd';
      if (days > 0) return days + 'd ' + hours + 'h';
      return hours + 'h';
    }

          {showPrediction && (
            <div style={{ marginTop: '0.75rem', padding: '0.75rem', background: 'rgba(99,102,241,0.07)', border: '1px solid rgba(99,102,241,0.15)', borderRadius: '0.625rem' }}>
              <div style={{ fontSize: '10px', fontWeight: 700, color: '#818cf8', marginBottom: '0.375rem', display: 'flex', alignItems: 'center', gap: '0.25rem' }}>
                <Icons.Brain size={11} /> NOVA AI PREDICTION
              </div>
              <div style={{ fontSize: '0.75rem', color: '#d1d5db', lineHeight: 1.6 }}>{event.prediction}</div>

        </div>
      );
    }

    function NewsEvents({ coins }) {
      const { userProfile } = useAuth();
      const [activeTab, setActiveTab] = useState('news');
      const [newsCat, setNewsCat] = useState('All');
      const [newsItems, setNewsItems] = useState([]);
      const [newsLoading, setNewsLoading] = useState(true);
      const [newsError, setNewsError] = useState('');
      const [lastFetched, setLastFetched] = useState(null);
      const [evtFilter, setEvtFilter] = useState('All');
      const events = useMemo(() => getCryptoEvents(coins), [coins]);

      // Email Dispatch states
      const [showEmailModal, setShowEmailModal] = useState(false);
      const [targetEmail, setTargetEmail] = useState("");
      const [dispatchStatus, setDispatchStatus] = useState('idle'); // idle, generating, sending, success, error
      const [dispatchError, setDispatchError] = useState('');
      const [generatedText, setGeneratedText] = useState('');
      const [emailPreviewHtml, setEmailPreviewHtml] = useState('');

      useEffect(() => {
        if (userProfile?.email && !targetEmail) {
          setTargetEmail(userProfile.email);
        }
      }, [userProfile]);

      // Clear stale/empty cache entries on mount so the waterfall fetch always runs fresh
      useEffect(() => {
        ['All', 'BTC', 'ETH', 'Market', 'DeFi', 'NFT', 'Regulation', 'Technology'].forEach(cat => {
          const cKey = 'ag_news_' + cat;
          const tKey = 'ag_news_t_' + cat;
          const cached = localStorage.getItem(cKey);
          if (!cached || JSON.parse(cached).length === 0) {
            localStorage.removeItem(cKey);
            localStorage.removeItem(tKey);
          }
        });
      }, []);

      const fetchNews = useCallback(async (cat, force) => {
        const cKey = 'ag_news_cache_v2';
        const tKey = 'ag_news_time_v2';
        const cached = localStorage.getItem(cKey);
        const cachedAt = parseInt(localStorage.getItem(tKey) || '0');

        let allArticles = [];

        // Try cache first (valid for 15 mins)
        if (!force && cached && Date.now() - cachedAt < 900000) {
          allArticles = JSON.parse(cached);
        } else {
          setNewsLoading(true); setNewsError('');
          try {
            const feeds = [
              'https://cointelegraph.com/rss',
              'https://www.coindesk.com/arc/outboundfeeds/rss/',
              'https://decrypt.co/feed',
              'https://cryptoslate.com/feed/'
            ];

            const promises = feeds.map(feed =>
              fetch('https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(feed))
                .then(r => r.ok ? r.json() : null)
                .catch(() => null)
            );

            const results = await Promise.all(promises);

            for (const res of results) {
              if (res && res.status === 'ok' && res.items) {
                const sourceName = res.feed.title || new URL(res.feed.link).hostname.replace('www.', '');
                const items = res.items.map(item => ({
                  id: item.guid || item.link,
                  title: item.title,
                  url: item.link,
                  body: item.description ? item.description.replace(/<[^>]*>?/gm, '').trim() : '',
                  imageurl: item.thumbnail || item.enclosure?.link || '',
                  published_on: new Date(item.pubDate.replace(/-/g, '/')).getTime() / 1000,
                  source: sourceName,
                  source_info: { name: sourceName },
                  categories: (item.categories || []).join('|')
                }));
                allArticles = [...allArticles, ...items];
              }
            }

            if (allArticles.length === 0) throw new Error('All news feeds failed to load.');

            // Sort by newest first
            allArticles.sort((a, b) => b.published_on - a.published_on);

            // Deduplicate by title similarity or exact URL
            const unique = [];
            const seen = new Set();
            for (const a of allArticles) {
              if (!seen.has(a.url)) {
                seen.add(a.url);
                unique.push(a);
              }
            }
            allArticles = unique;

            localStorage.setItem(cKey, JSON.stringify(allArticles));
            localStorage.setItem(tKey, Date.now().toString());
            setLastFetched(new Date());
          } catch (err) {
            setNewsError(err.message);
            const stale = localStorage.getItem(cKey);
            if (stale) {
              allArticles = JSON.parse(stale);
              setNewsError('Showing cached news (live feeds unavailable)');
            } else {
              setNewsLoading(false);
              return;
            }
          }
        }

        // Client-side filtering
        let filtered = allArticles;
        if (cat !== 'All') {
          const lowerCat = cat.toLowerCase();
          filtered = allArticles.filter(a => {
            const tags = (a.categories || '').toLowerCase();
            const title = a.title.toLowerCase();
            const body = a.body.toLowerCase();

            if (cat === 'BTC') return tags.includes('bitcoin') || tags.includes('btc') || title.includes('bitcoin') || title.includes('btc');
            if (cat === 'ETH') return tags.includes('ethereum') || tags.includes('eth') || title.includes('ethereum') || title.includes('eth');
            if (cat === 'DeFi') return tags.includes('defi') || title.includes('defi') || tags.includes('decentralized');
            if (cat === 'NFT') return tags.includes('nft') || title.includes('nft');
            if (cat === 'Regulation') return tags.includes('regulation') || tags.includes('sec') || title.includes('sec') || title.includes('law') || title.includes('bill');
            if (cat === 'Market') return tags.includes('market') || tags.includes('price') || tags.includes('analysis') || title.includes('price');
            if (cat === 'Technology') return tags.includes('tech') || tags.includes('upgrade') || tags.includes('blockchain');
            return tags.includes(lowerCat) || title.includes(lowerCat);
          });
        }

        setNewsItems(filtered.slice(0, 40));
        setNewsLoading(false);
      }, []);

      const handleEmailDispatch = async (e) => {
        if (e) e.preventDefault();
        if (!targetEmail) {
          setDispatchError("Please enter a valid email address.");
          return;

        const apiKey = localStorage.getItem("nova_gemini_key");
        if (!apiKey) {

          setDispatchError("No Gemini API key connected. Please set one in settings (cog icon in sidebar) to generate the AI digest report.");
          return;

        setDispatchStatus('generating');
        setDispatchError('');
        try {
          const topNews = newsItems.slice(0, 8);
          if (topNews.length === 0) {
            throw new Error("No news articles available to analyze. Please refresh the headlines first.");
          }

          const newsContext = topNews.map((a, idx) => `[${idx + 1}] ${a.title} (Source: ${a.source})`).join("\n");
          const prompt = `You are the ANTIGRAVITY AI Market Intelligence Engine.
Analyze the following crypto market news and write a sharp, concise daily newsletter summary.
Focus on identifying major macro developments, shifting trends, regulatory impact, and coin metrics.
Keep the output engaging and under 180 words. Do not include signature/footer notes.

Latest Headlines:
${newsContext}

Market movers context:
Gainers: ${pulse ? pulse.top?.symbol.toUpperCase() || 'N/A' : 'N/A'}
Market Breadth: ${pulse ? pulse.ratio : '50'}% positive trend.`;

          const aiSummary = await callGeminiAPI(apiKey, [], prompt, coins);
          setGeneratedText(aiSummary);

          setDispatchStatus('sending');

          const sorted = [...coins].sort((a, b) => (b.price_change_percentage_24h || 0) - (a.price_change_percentage_24h || 0));
          const topGainers = sorted.slice(0, 3);
          const trendingCoins = coins.slice(5, 9);

          const gainersHtml = topGainers.map(c => `
            <tr style="border-bottom: 1px solid rgba(255,255,255,0.05);">

              <td style="padding: 10px 0; font-size: 13px; color: #a5b4fc; text-align: right; font-family: sans-serif;">$${c.current_price?.toLocaleString()}</td>
              <td style="padding: 10px 0; font-size: 13px; color: #22c55e; text-align: right; font-weight: bold; font-family: sans-serif;">+${c.price_change_percentage_24h?.toFixed(1)}%</td>
            </tr>
          `).join("");

          const trendingHtml = trendingCoins.map(c => `
            <span style="display: inline-block; background: rgba(99,102,241,0.08); border: 1px solid rgba(99,102,241,0.2); border-radius: 6px; padding: 4px 10px; margin: 4px 2px; font-size: 11px; color: #c7d2fe; font-weight: bold; font-family: sans-serif;">
              🔥 ${c.name} (${c.symbol.toUpperCase()})
            </span>
          `).join("");

          const formattedSummary = aiSummary.split("\n\n").map(p => `

              </style>

            <body>
              <div class="card">
                <div class="header">
                  <h2>🛸 Antigravity AI Report</h2>

                <div class="content">
                  <p style="color: #9ca3af; font-size: 12px; margin: 0 0 16px 0; font-family: sans-serif;">Hello Trader, here is your live crypto market intelligence report:</p>
                  
                  <div class="section-title">Gemini AI Market Summary</div>

                    ${formattedSummary}

                    <thead>

                        <th style="text-align: left; padding: 6px 0;">Asset</th>
                        <th style="text-align: right; padding: 6px 0;">Price</th>

                      </tr>
                    </thead>
                    <tbody>
                      ${gainersHtml}
                    </tbody>
                  </table>
        
                  <div class="section-title">Trending Narratives</div>
                  <div style="margin-bottom: 8px;">
                    ${trendingHtml}
                  </div>
