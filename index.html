  <script type="text/babel" data-type="module">
    // =====================================================
    // ANTIGRAVITY — COMPLETE SINGLE-FILE APPLICATION
    // =====================================================
    const { useState, useEffect, useCallback, createContext, useContext, useMemo, useRef } = React;
    const { HashRouter: Router, Routes, Route, Navigate, Link, useLocation, useParams } = ReactRouterDOM;
    const { ResponsiveContainer, AreaChart, Area, XAxis, YAxis, Tooltip, CartesianGrid } = Recharts;
    const Icons = lucideReact;

    // =====================================================
    // SECTION 1: AUTH CONTEXT (localStorage mock)
    // =====================================================
    const AuthContext = createContext();
    function useAuth() { return useContext(AuthContext); }

    function AuthProvider({ children }) {
      const [currentUser, setCurrentUser] = useState(null);
      const [userProfile, setUserProfile] = useState(null);
      const [loading, setLoading] = useState(true);

      const fetchUserProfile = (uid, email) => {
        const mockUsers = JSON.parse(localStorage.getItem("mock_users") || "{}");
        const profile = mockUsers[uid] || { uid, email, displayName: email.split("@")[0], emailVerified: false, watchlist: [], alerts: [], portfolio: [], createdAt: new Date().toISOString() };
        setUserProfile(profile);
        return profile;
      };

      useEffect(() => {
        const storedSession = localStorage.getItem("mock_active_session");
        if (storedSession) {
          const sessionUser = JSON.parse(storedSession);
          setCurrentUser(sessionUser);
          fetchUserProfile(sessionUser.uid, sessionUser.email);
        }
        setLoading(false);
      }, []);

      const signup = async (name, email, password) => {
        const mockUsers = JSON.parse(localStorage.getItem("mock_users") || "{}");
        const emailExists = Object.values(mockUsers).some(u => u.email.toLowerCase() === email.toLowerCase());
        if (emailExists) throw new Error("auth/email-already-in-use");
        const uid = "mock_uid_" + Math.random().toString(36).substring(2, 9);
        const newUser = { uid, email, displayName: name, emailVerified: false, watchlist: [], alerts: [], portfolio: [], createdAt: new Date().toISOString() };
        mockUsers[uid] = newUser;
        localStorage.setItem("mock_users", JSON.stringify(mockUsers));
        return newUser;
      };

      const login = async (email, password) => {
        const mockUsers = JSON.parse(localStorage.getItem("mock_users") || "{}");
        const userMatch = Object.values(mockUsers).find(u => u.email.toLowerCase() === email.toLowerCase());
        if (!userMatch) throw new Error("auth/user-not-found");
        if (!userMatch.emailVerified) throw new Error("auth/email-not-verified");
        const sessionUser = { uid: userMatch.uid, email: userMatch.email, displayName: userMatch.displayName, emailVerified: true };
        localStorage.setItem("mock_active_session", JSON.stringify(sessionUser));
        setCurrentUser(sessionUser);
        setUserProfile(userMatch);
        return sessionUser;
      };

      const resetPassword = async (email) => { console.log("[MOCK RESET PASSWORD] Link sent to", email); return true; };

      const logout = async () => {
        localStorage.removeItem("mock_active_session");
        setCurrentUser(null);
        setUserProfile(null);
      };

      const simulateVerifyEmail = (email) => {
        const mockUsers = JSON.parse(localStorage.getItem("mock_users") || "{}");
        const userKey = Object.keys(mockUsers).find(k => mockUsers[k].email.toLowerCase() === email.toLowerCase());
        if (userKey) { mockUsers[userKey].emailVerified = true; localStorage.setItem("mock_users", JSON.stringify(mockUsers)); return true; }
        return false;
      };

      const toggleWatchlist = async (coinId) => {
        if (!userProfile) return;
        const isWatched = userProfile.watchlist?.includes(coinId);
        const newWatchlist = isWatched ? userProfile.watchlist.filter(id => id !== coinId) : [...(userProfile.watchlist || []), coinId];
        const mockUsers = JSON.parse(localStorage.getItem("mock_users") || "{}");
        mockUsers[userProfile.uid].watchlist = newWatchlist;
        localStorage.setItem("mock_users", JSON.stringify(mockUsers));
        setUserProfile(prev => ({ ...prev, watchlist: newWatchlist }));
      };

      const addAlert = async (alertData) => {
        if (!userProfile) return;
        const newAlert = { id: "alert_" + Math.random().toString(36).substring(2, 9), createdAt: new Date().toISOString(), isActive: true, ...alertData };
        const newAlerts = [...(userProfile.alerts || []), newAlert];
        const mockUsers = JSON.parse(localStorage.getItem("mock_users") || "{}");
        mockUsers[userProfile.uid].alerts = newAlerts;
        localStorage.setItem("mock_users", JSON.stringify(mockUsers));
        setUserProfile(prev => ({ ...prev, alerts: newAlerts }));
      };

      const toggleAlert = async (alertId) => {
        if (!userProfile) return;
        const newAlerts = userProfile.alerts.map(a => a.id === alertId ? { ...a, isActive: !a.isActive } : a);
        const mockUsers = JSON.parse(localStorage.getItem("mock_users") || "{}");
        mockUsers[userProfile.uid].alerts = newAlerts;
        localStorage.setItem("mock_users", JSON.stringify(mockUsers));
        setUserProfile(prev => ({ ...prev, alerts: newAlerts }));
      };

      const deleteAlert = async (alertId) => {
        if (!userProfile) return;
        const newAlerts = userProfile.alerts.filter(a => a.id !== alertId);
        const mockUsers = JSON.parse(localStorage.getItem("mock_users") || "{}");
        mockUsers[userProfile.uid].alerts = newAlerts;
        localStorage.setItem("mock_users", JSON.stringify(mockUsers));
        setUserProfile(prev => ({ ...prev, alerts: newAlerts }));
      };

      const updatePortfolio = async (newPortfolio) => {
        if (!userProfile) return;
        const mockUsers = JSON.parse(localStorage.getItem("mock_users") || "{}");
        mockUsers[userProfile.uid].portfolio = newPortfolio;
        localStorage.setItem("mock_users", JSON.stringify(mockUsers));
        setUserProfile(prev => ({ ...prev, portfolio: newPortfolio }));
      };

      const value = { currentUser, userProfile, loading, signup, login, logout, resetPassword, simulateVerifyEmail, toggleWatchlist, addAlert, toggleAlert, deleteAlert, updatePortfolio, isMockFirebase: true };
      return <AuthContext.Provider value={value}>{!loading && children}</AuthContext.Provider>;
    }

    // =====================================================
    // SECTION 3: LOGIN / SIGNUP PAGE
    // =====================================================
    function LoginSignup() {
      const { signup, login, resetPassword, simulateVerifyEmail } = useAuth();
      const [isLogin, setIsLogin] = useState(true);
      const [isForgot, setIsForgot] = useState(false);
      const [name, setName] = useState("");
      const [email, setEmail] = useState("");
      const [password, setPassword] = useState("");
      const [confirmPassword, setConfirmPassword] = useState("");
      const [error, setError] = useState("");
      const [success, setSuccess] = useState("");
      const [loading, setLoading] = useState(false);
      const [needsVerification, setNeedsVerification] = useState(false);

      const handleAuth = async (e) => {
        e.preventDefault(); setError(""); setSuccess(""); setLoading(true);
        try {
          if (isLogin) { await login(email, password); }
          else {
            if (password !== confirmPassword) throw new Error("passwords-dont-match");
            if (password.length < 6) throw new Error("auth/weak-password");
            await signup(name, email, password);
            setNeedsVerification(true);
            setSuccess("Account created! Click 'Simulate Email Verification' below, then Sign In.");
          }
        } catch (err) {
          if (err.message === "passwords-dont-match") setError("Passwords do not match.");
          else if (err.message.includes("email-already-in-use")) setError("This email is already registered.");
          else if (err.message.includes("user-not-found")) setError("No account found with this email.");
          else if (err.message.includes("email-not-verified")) { setNeedsVerification(true); setError("Email not verified. Click the verify button below."); }
          else if (err.message.includes("weak-password")) setError("Password must be at least 6 characters.");
          else setError("Auth failed: " + err.message);
        } finally { setLoading(false); }
      };

      const handleForgot = async (e) => { e.preventDefault(); setError(""); setLoading(true); try { await resetPassword(email); setSuccess("Password reset link sent (mock)."); } catch (err) { setError(err.message); } finally { setLoading(false); } };
      const handleMockVerify = () => { const ok = simulateVerifyEmail(email); if (ok) { setSuccess("Email verified! You can now Sign In."); setNeedsVerification(false); setError(""); } else { setError("Email not found. Sign up first."); } };

      const inputStyle = { width: '100%', background: '#141421', border: '1px solid #1f2937', borderRadius: '0.5rem', padding: '0.75rem 1rem 0.75rem 2.5rem', color: '#fff', fontSize: '0.875rem', transition: 'border-color 0.15s' };
      const btnStyle = { width: '100%', background: '#2563eb', color: '#fff', fontWeight: 700, padding: '0.75rem 1rem', borderRadius: '0.5rem', border: 'none', cursor: 'pointer', fontSize: '0.875rem', marginTop: '0.5rem' };

      return (
        <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: '#0a0a0f', padding: '1.5rem', position: 'relative' }}>
          <div style={{ position: 'absolute', top: '25%', left: '25%', width: '24rem', height: '24rem', background: 'rgba(37,99,235,0.1)', borderRadius: '9999px', filter: 'blur(120px)', pointerEvents: 'none' }}></div>
          <div style={{ position: 'absolute', bottom: '25%', right: '25%', width: '24rem', height: '24rem', background: 'rgba(147,51,234,0.1)', borderRadius: '9999px', filter: 'blur(120px)', pointerEvents: 'none' }}></div>

          <div style={{ width: '100%', maxWidth: '28rem', background: '#0d0d14', border: '1px solid #1f2937', borderRadius: '1rem', boxShadow: '0 25px 50px -12px rgba(0,0,0,.25)', padding: '2rem', zIndex: 10 }}>
            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', marginBottom: '2rem' }}>
              <div style={{ background: '#2563eb', padding: '0.75rem', borderRadius: '1rem', color: '#fff', marginBottom: '0.75rem', boxShadow: '0 10px 15px -3px rgba(37,99,235,0.2)' }}><Icons.Activity size={28}/></div>
              <h1 style={{ fontSize: '1.5rem', fontWeight: 700, color: '#fff', margin: 0, letterSpacing: '-0.025em' }}>ANTIGRAVITY MARKET AI</h1>
              <p style={{ color: '#9ca3af', fontSize: '0.75rem', marginTop: '0.25rem' }}>AI-Powered Crypto Analysis Platform</p>
            </div>

            {/* Demo Mode Notice */}
            <div style={{ marginBottom: '1.5rem', padding: '1rem', borderRadius: '0.75rem', background: 'rgba(120,80,0,0.15)', border: '1px solid rgba(120,80,0,0.25)', color: '#eab308', fontSize: '0.75rem' }}>
              <p style={{ fontWeight: 600, display: 'flex', alignItems: 'center', gap: '0.375rem', margin: 0 }}><Icons.AlertTriangle size={14}/> Demo Mode Active</p>
              <p style={{ color: '#d1d5db', margin: '0.5rem 0 0' }}>All data is saved to your browser's localStorage. No server required.</p>
              {needsVerification && <button onClick={handleMockVerify} style={{ marginTop: '0.5rem', width: '100%', background: '#eab308', color: '#0a0a0f', fontWeight: 700, padding: '0.375rem 0.75rem', borderRadius: '0.25rem', border: 'none', cursor: 'pointer' }}>Click to Simulate Email Verification</button>}
            </div>

            {/* Tabs */}
            {!isForgot && (
              <div style={{ display: 'flex', borderBottom: '1px solid #1f2937', marginBottom: '1.5rem' }}>
                <button onClick={() => { setIsLogin(true); setError(""); setSuccess(""); setNeedsVerification(false); }} style={{ flex: 1, paddingBottom: '0.75rem', fontSize: '0.875rem', fontWeight: 600, background: 'transparent', border: 'none', borderBottom: isLogin ? '2px solid #3b82f6' : '2px solid transparent', color: isLogin ? '#60a5fa' : '#6b7280', cursor: 'pointer' }}>Sign In</button>
                <button onClick={() => { setIsLogin(false); setError(""); setSuccess(""); setNeedsVerification(false); }} style={{ flex: 1, paddingBottom: '0.75rem', fontSize: '0.875rem', fontWeight: 600, background: 'transparent', border: 'none', borderBottom: !isLogin ? '2px solid #3b82f6' : '2px solid transparent', color: !isLogin ? '#60a5fa' : '#6b7280', cursor: 'pointer' }}>Register</button>
              </div>
            )}

            {error && <div style={{ marginBottom: '1rem', padding: '0.75rem', borderRadius: '0.5rem', background: 'rgba(180,30,30,0.15)', border: '1px solid rgba(180,30,30,0.25)', color: '#f87171', fontSize: '0.875rem', display: 'flex', alignItems: 'center', gap: '0.5rem' }}><Icons.AlertTriangle size={16}/><span>{error}</span></div>}
            {success && <div style={{ marginBottom: '1rem', padding: '0.75rem', borderRadius: '0.5rem', background: 'rgba(30,120,30,0.15)', border: '1px solid rgba(30,120,30,0.25)', color: '#4ade80', fontSize: '0.875rem', display: 'flex', alignItems: 'center', gap: '0.5rem' }}><Icons.CheckCircle2 size={16}/><span>{success}</span></div>}

            {isForgot ? (
              <form onSubmit={handleForgot}>
                <div style={{ position: 'relative', marginBottom: '1rem' }}><Icons.Mail style={{ position: 'absolute', left: '0.75rem', top: '0.875rem', color: '#6b7280' }} size={16}/><input type="email" required value={email} onChange={e => setEmail(e.target.value)} placeholder="name@example.com" style={inputStyle}/></div>
                <button type="submit" disabled={loading} style={btnStyle}>{loading ? "Sending..." : "Send Reset Link"}</button>
                <button type="button" onClick={() => { setIsForgot(false); setError(""); setSuccess(""); }} style={{ width: '100%', textAlign: 'center', fontSize: '0.75rem', color: '#9ca3af', cursor: 'pointer', marginTop: '0.75rem', background: 'transparent', border: 'none' }}>Back to Sign In</button>
              </form>
            ) : (
              <form onSubmit={handleAuth}>
                {!isLogin && <div style={{ position: 'relative', marginBottom: '1rem' }}><Icons.User style={{ position: 'absolute', left: '0.75rem', top: '0.875rem', color: '#6b7280' }} size={16}/><input type="text" required value={name} onChange={e => setName(e.target.value)} placeholder="Full Name" style={inputStyle}/></div>}
                <div style={{ position: 'relative', marginBottom: '1rem' }}><Icons.Mail style={{ position: 'absolute', left: '0.75rem', top: '0.875rem', color: '#6b7280' }} size={16}/><input type="email" required value={email} onChange={e => setEmail(e.target.value)} placeholder="name@example.com" style={inputStyle}/></div>
                <div style={{ position: 'relative', marginBottom: '1rem' }}>
                  <Icons.Lock style={{ position: 'absolute', left: '0.75rem', top: '0.875rem', color: '#6b7280' }} size={16}/>
                  <input type="password" required value={password} onChange={e => setPassword(e.target.value)} placeholder="••••••••" style={inputStyle}/>
                  {isLogin && <button type="button" onClick={() => { setIsForgot(true); setError(""); setSuccess(""); }} style={{ position: 'absolute', right: 0, top: '-1.5rem', fontSize: '0.75rem', color: '#3b82f6', cursor: 'pointer', background: 'transparent', border: 'none' }}>Forgot?</button>}
                </div>
                {!isLogin && <div style={{ position: 'relative', marginBottom: '1rem' }}><Icons.Lock style={{ position: 'absolute', left: '0.75rem', top: '0.875rem', color: '#6b7280' }} size={16}/><input type="password" required value={confirmPassword} onChange={e => setConfirmPassword(e.target.value)} placeholder="Confirm Password" style={inputStyle}/></div>}
                <button type="submit" disabled={loading} style={btnStyle}>{loading ? "Please wait..." : isLogin ? "Sign In" : "Create Account"}</button>
              </form>
            )}
          </div>
        </div>
      );
    }

                  <div style={{ flex: 1, minWidth: 0 }}>

                </div>
                <button onClick={logout} style={{ width: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '0.5rem 1rem', fontSize: '0.75rem', fontWeight: 600, color: '#9ca3af', background: 'rgba(17,24,39,0.5)', border: '1px solid #1f2937', borderRadius: '0.5rem', cursor: 'pointer', transition: 'all 0.15s' }}><Icons.LogOut size={14} style={{ marginRight: '0.5rem' }}/> Sign Out</button>

              </div>
            </div>
            {/* Top Losers */}

    // =====================================================

    function Market({ coins, loading: isLoading }) {
      const { userProfile, toggleWatchlist } = useAuth();
      const [searchTerm, setSearchTerm] = useState("");
      const [filterType, setFilterType] = useState("all");
      const [currentPage, setCurrentPage] = useState(1);
      const itemsPerPage = 25;

      const filtered = useMemo(() => {

        if (filterType === "top100") result = result.filter(c => c.market_cap_rank <= 100);
        else if (filterType === "gainers") result = result.filter(c => c.price_change_percentage_24h > 0);

                <thead><tr style={{ borderBottom: '1px solid #1f2937', fontSize: '11px', fontWeight: 700, color: '#6b7280', textTransform: 'uppercase', letterSpacing: '0.05em', background: 'rgba(17,24,39,0.2)' }}>

                </tr></thead>
                <tbody>
                  {paginated.length === 0 ? <tr><td colSpan={7} style={{ padding: '2rem', textAlign: 'center', color: '#6b7280', fontSize: '0.875rem' }}>No matching cryptocurrencies found.</td></tr> :

                      <tr key={coin.id} className={coin.flashClass || ""} style={{ borderBottom: '1px solid rgba(31,41,55,0.5)', fontSize: '0.875rem', fontWeight: 500 }}>

                        <td style={{ padding: '1rem' }}><Link to={"/coin/" + coin.id} style={{ display: 'flex', alignItems: 'center', gap: '0.75rem' }}><img src={coin.image} alt={coin.name} style={{ width: '1.5rem', height: '1.5rem', borderRadius: '9999px' }}/><div><span style={{ color: '#fff', fontWeight: 700, display: 'block', lineHeight: 1 }}>{coin.name}</span><span style={{ fontSize: '10px', color: '#6b7280', textTransform: 'uppercase', display: 'block', marginTop: '0.125rem' }}>{coin.symbol}</span></div></Link></td>

                <span style={{ fontSize: '0.75rem', color: '#6b7280', fontWeight: 600 }}>Showing <strong style={{ color: '#d1d5db' }}>{startIndex + 1}</strong> to <strong style={{ color: '#d1d5db' }}>{Math.min(startIndex + itemsPerPage, filtered.length)}</strong> of <strong style={{ color: '#d1d5db' }}>{filtered.length}</strong></span>
                <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                  <button onClick={() => setCurrentPage(p => Math.max(p - 1, 1))} disabled={currentPage === 1} style={{ padding: '0.5rem', background: '#111827', border: '1px solid #1f2937', color: '#9ca3af', borderRadius: '0.5rem', cursor: 'pointer' }}><Icons.ChevronLeft size={16}/></button>
                  <span style={{ fontSize: '0.75rem', fontWeight: 700, color: '#60a5fa', padding: '0.25rem 0.75rem', background: 'rgba(37,99,235,0.1)', borderRadius: '0.5rem' }}>Page {currentPage} of {totalPages}</span>

    // =====================================================
    // SECTION 8: COIN DETAIL PAGE (Chart + Stats)
    // =====================================================
    function CoinDetail({ coins }) {
      const { id } = useParams();
      const { userProfile, toggleWatchlist } = useAuth();
      const coin = coins.find(c => c.id === id || c.symbol.toLowerCase() === id.toLowerCase());
      const isWatched = userProfile?.watchlist?.includes(coin?.id);
      const [days, setDays] = useState("30");
      const [chartData, setChartData] = useState([]);
      const [loadingChart, setLoadingChart] = useState(true);

      const fetchChartData = async () => {
        if (!coin) return;
        setLoadingChart(true);
        try {
          const res = await fetch(`https://api.coingecko.com/api/v3/coins/${coin.id}/market_chart?vs_currency=usd&days=${days}`);
          const data = await res.json();
          if (data.prices) { setChartData(data.prices.map(p => ({ time: p[0], price: p[1] }))); }
        } catch (err) {
          const dataPoints = days === "7" ? 50 : days === "30" ? 100 : 150;
          const walk = []; let base = coin.current_price * 0.9; const step = coin.current_price * 0.008;
          for (let i = 0; i < dataPoints; i++) { const time = Date.now() - (dataPoints - i) * (parseInt(days) * 86400000 / dataPoints); base = base + (Math.random() - 0.47) * step; walk.push({ time, price: Math.max(0, base) }); }
          walk[walk.length - 1] = { time: Date.now(), price: coin.current_price };
          setChartData(walk);
        } finally { setLoadingChart(false); }
      };

      useEffect(() => { if (coin) fetchChartData(); }, [coin, days]);

      if (!coin) return <div style={{ textAlign: 'center', color: '#6b7280', paddingTop: '3rem' }}><p style={{ fontWeight: 700, fontSize: '0.875rem' }}>Asset not found.</p><Link to="/market" style={{ color: '#3b82f6', textDecoration: 'underline', fontSize: '0.75rem' }}>Return to Market</Link></div>;

      const isGainer = coin.price_change_percentage_24h >= 0;
      const CustomTooltip = ({ active, payload }) => {
        if (active && payload && payload.length) return <div style={{ background: '#0f0f18', border: '1px solid #1f2937', padding: '0.625rem', borderRadius: '0.5rem', fontSize: '0.75rem', fontWeight: 600 }}><p style={{ color: '#9ca3af', margin: 0 }}>{new Date(payload[0].payload.time).toLocaleString()}</p><p style={{ color: '#60a5fa', margin: '0.25rem 0 0', fontWeight: 700 }}>${payload[0].value?.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 4 })}</p></div>;
        return null;
      };

      return (
        <div className="space-y-6">
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', paddingBottom: '1rem', borderBottom: '1px solid #1f2937' }}>
            <Link to="/market" style={{ display: 'flex', alignItems: 'center', gap: '0.375rem', fontSize: '0.75rem', color: '#9ca3af', fontWeight: 600 }}><Icons.ArrowLeft size={16}/> Spot Markets</Link>
            <button onClick={() => toggleWatchlist(coin.id)} style={{ display: 'flex', alignItems: 'center', gap: '0.375rem', padding: '0.5rem 1rem', border: '1px solid ' + (isWatched ? '#eab308' : '#1f2937'), borderRadius: '0.75rem', fontSize: '0.75rem', fontWeight: 700, background: isWatched ? 'rgba(234,179,8,0.1)' : 'transparent', color: isWatched ? '#eab308' : '#9ca3af', cursor: 'pointer' }}>
              <Icons.Star size={14} fill={isWatched ? '#eab308' : 'none'}/> {isWatched ? "On Watchlist" : "Add to Watchlist"}
            </button>
          </div>

          <div style={{ display: 'flex', flexWrap: 'wrap', justifyContent: 'space-between', alignItems: 'flex-start', gap: '1rem', background: '#0d0d14', border: '1px solid #1f2937', padding: '1.5rem', borderRadius: '1rem' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: '1rem' }}>
              <img src={coin.image} alt={coin.name} style={{ width: '3.5rem', height: '3.5rem', borderRadius: '9999px' }}/>
              <div>
                <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}><h1 style={{ fontSize: '1.5rem', fontWeight: 900, color: '#fff', margin: 0 }}>{coin.name}</h1><span style={{ fontSize: '10px', color: '#6b7280', textTransform: 'uppercase', fontWeight: 900, background: '#111827', border: '1px solid #1f2937', padding: '0.125rem 0.5rem', borderRadius: '0.25rem' }}>{coin.symbol}</span></div>
                <span style={{ fontSize: '0.75rem', color: '#6b7280', fontWeight: 600 }}>Market Cap Rank: <strong style={{ color: '#fff' }}>#{coin.market_cap_rank}</strong></span>
              </div>
            </div>
            <div style={{ textAlign: 'right' }}>
              <div style={{ fontSize: '1.875rem', fontWeight: 800, color: '#fff' }}>${coin.current_price?.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 6 })}</div>
              <div style={{ fontSize: '0.875rem', fontWeight: 700, marginTop: '0.375rem', display: 'flex', alignItems: 'center', justifyContent: 'flex-end', gap: '0.25rem', color: isGainer ? '#22c55e' : '#ef4444' }}>
                {isGainer ? <Icons.TrendingUp size={16}/> : <Icons.TrendingDown size={16}/>}
                <span>{isGainer ? "+" : ""}{coin.price_change_percentage_24h?.toFixed(2)}%</span>
              </div>
            </div>
          </div>

          {/* Chart */}
          <div className="glass-panel" style={{ padding: '1.5rem', borderRadius: '1rem' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem' }}>
              <h2 style={{ fontSize: '0.875rem', fontWeight: 700, color: '#fff', textTransform: 'uppercase', letterSpacing: '0.05em', margin: 0 }}>Historical Trend</h2>
              <div style={{ display: 'flex', background: 'rgba(17,24,39,0.4)', padding: '0.25rem', border: '1px solid rgba(31,41,55,0.5)', borderRadius: '0.75rem', gap: '0.25rem' }}>
                {[{ id: "7", label: "7D" }, { id: "30", label: "30D" }, { id: "90", label: "90D" }, { id: "365", label: "1Y" }].map(tf => (
                  <button key={tf.id} onClick={() => setDays(tf.id)} style={{ padding: '0.25rem 0.75rem', fontSize: '10px', fontWeight: 700, borderRadius: '0.5rem', border: 'none', cursor: 'pointer', background: days === tf.id ? '#2563eb' : 'transparent', color: days === tf.id ? '#fff' : '#6b7280' }}>{tf.label}</button>
                ))}
              </div>
            </div>
            <div style={{ width: '100%', height: '320px' }}>
              {loadingChart ? <CardSkeleton/> :
                <ResponsiveContainer width="100%" height="100%">
                  <AreaChart data={chartData} margin={{ top: 10, right: 10, left: -20, bottom: 0 }}>
                    <defs><linearGradient id="priceGradient" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#3b82f6" stopOpacity={0.35}/><stop offset="95%" stopColor="#3b82f6" stopOpacity={0.0}/></linearGradient></defs>
                    <CartesianGrid strokeDasharray="3 3" stroke="#1f2937" vertical={false}/>
                    <XAxis dataKey="time" tickFormatter={v => new Date(v).toLocaleDateString(undefined, { month: "short", day: "numeric" })} stroke="#4b5563" fontSize={10} tickLine={false}/>
                    <YAxis stroke="#4b5563" fontSize={10} tickLine={false} domain={["auto", "auto"]} tickFormatter={v => `$${v?.toLocaleString(undefined, { maximumFractionDigits: 2 })}`}/>
                    <Tooltip content={<CustomTooltip/>}/>
                    <Area type="monotone" dataKey="price" stroke="#3b82f6" strokeWidth={2} fillOpacity={1} fill="url(#priceGradient)"/>
                  </AreaChart>
                </ResponsiveContainer>
              }
            </div>
          </div>

          {/* Tokenomics */}
          <div className="glass-panel" style={{ padding: '1.5rem', borderRadius: '1rem' }}>
            <h2 style={{ fontSize: '0.875rem', fontWeight: 700, color: '#fff', textTransform: 'uppercase', margin: '0 0 1rem' }}>Tokenomics & Metrics</h2>
            <div className="grid grid-cols-2 grid-cols-md-4" style={{ gap: '1rem' }}>
              {[{ label: "All-Time High", val: "$" + (coin.ath?.toLocaleString() || "N/A"), sub: (coin.ath_change_percentage?.toFixed(2) || 0) + "% from ATH", subColor: '#ef4444' },
                { label: "All-Time Low", val: "$" + (coin.atl?.toLocaleString() || "N/A"), sub: "+" + (coin.atl_change_percentage?.toFixed(2) || 0) + "% from ATL", subColor: '#22c55e' },
                { label: "Circulating Supply", val: coin.circulating_supply?.toLocaleString() || "N/A", sub: "Max: " + (coin.max_supply?.toLocaleString() || "Unlimited"), subColor: '#6b7280' },
                { label: "Fully Diluted Val.", val: "$" + (coin.fully_diluted_valuation?.toLocaleString() || "N/A"), sub: "24h vol: $" + (coin.total_volume?.toLocaleString()), subColor: '#6b7280' }
              ].map((m, i) => (
                <div key={i} style={{ background: 'rgba(17,24,39,0.4)', border: '1px solid rgba(31,41,55,0.5)', padding: '1rem', borderRadius: '0.75rem' }}>
                  <span style={{ color: '#6b7280', display: 'block', textTransform: 'uppercase', fontSize: '10px' }}>{m.label}</span>
                  <strong style={{ color: '#fff', display: 'block', marginTop: '0.25rem', fontSize: '0.875rem' }}>{m.val}</strong>
                  <span style={{ color: m.subColor, fontSize: '10px', marginTop: '0.125rem', display: 'block' }}>{m.sub}</span>
                </div>
              ))}
            </div>
          </div>
          <footer style={{ paddingTop: '1.5rem', borderTop: '1px solid #111827', textAlign: 'center', fontSize: '0.75rem', color: '#4b5563', fontWeight: 500 }}>🛡️ AI-generated analysis, not financial advice.</footer>
        </div>
      );
    }

            <div style={{ overflowX: 'auto' }}>
              <table style={{ width: '100%', textAlign: 'left', minWidth: '700px' }}>
                <thead><tr style={{ borderBottom: '1px solid #1f2937', fontSize: '11px', fontWeight: 700, color: '#6b7280', textTransform: 'uppercase', background: 'rgba(17,24,39,0.2)' }}><th style={{ padding: '1rem', width: '4rem', textAlign: 'center' }}>Remove</th><th style={{ padding: '1rem' }}>Asset</th><th style={{ padding: '1rem', textAlign: 'right' }}>Price</th><th style={{ padding: '1rem', textAlign: 'right' }}>24h</th><th style={{ padding: '1rem', textAlign: 'right' }}>Market Cap</th><th style={{ padding: '1rem', textAlign: 'center' }}>View</th></tr></thead>
                <tbody>
                  {watchedCoins.length === 0 ? <tr><td colSpan={6} style={{ padding: '3rem', textAlign: 'center', color: '#6b7280', fontSize: '0.875rem' }}>Watchlist is empty. <Link to="/market" style={{ color: '#3b82f6' }}>Browse Markets</Link></td></tr> :
                  watchedCoins.map(coin => {
                    const isG = coin.price_change_percentage_24h >= 0;
                    return (
                      <tr key={coin.id} style={{ borderBottom: '1px solid rgba(31,41,55,0.5)', fontSize: '0.875rem', fontWeight: 500 }}>
                        <td style={{ padding: '1rem', textAlign: 'center' }}><button onClick={() => toggleWatchlist(coin.id)} style={{ background: 'transparent', border: 'none', color: '#6b7280', cursor: 'pointer' }}><Icons.Trash2 size={16}/></button></td>
                        <td style={{ padding: '1rem' }}><Link to={"/coin/" + coin.id} style={{ display: 'flex', alignItems: 'center', gap: '0.75rem' }}><img src={coin.image} alt={coin.name} style={{ width: '1.5rem', height: '1.5rem', borderRadius: '9999px' }}/><div><span style={{ color: '#fff', fontWeight: 700, display: 'block' }}>{coin.name}</span><span style={{ fontSize: '10px', color: '#6b7280', textTransform: 'uppercase' }}>{coin.symbol}</span></div></Link></td>
                        <td style={{ padding: '1rem', textAlign: 'right', fontWeight: 600, color: '#fff' }}>${coin.current_price?.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 6 })}</td>
                        <td style={{ padding: '1rem', textAlign: 'right', fontWeight: 700, color: isG ? '#22c55e' : '#ef4444' }}>{isG ? "▲" : "▼"} {Math.abs(coin.price_change_percentage_24h || 0).toFixed(2)}%</td>
                        <td style={{ padding: '1rem', textAlign: 'right', color: '#d1d5db', fontWeight: 600 }}>${coin.market_cap?.toLocaleString()}</td>
                        <td style={{ padding: '1rem', textAlign: 'center' }}><Link to={"/coin/" + coin.id} style={{ display: 'inline-flex', alignItems: 'center', gap: '0.25rem', padding: '0.25rem 0.75rem', background: 'rgba(37,99,235,0.1)', color: '#60a5fa', borderRadius: '0.5rem', fontSize: '0.75rem', fontWeight: 600 }}>AI View <Icons.ArrowUpRight size={12}/></Link></td>

    // =====================================================
    // SECTION 10: PORTFOLIO PAGE (Simplified)
    // =====================================================
    function Portfolio({ coins }) {
      const { userProfile, updatePortfolio } = useAuth();
      const [selectedCoinId, setSelectedCoinId] = useState("");
      const [amount, setAmount] = useState("");
      const [buyPrice, setBuyPrice] = useState("");

      useEffect(() => { if (coins.length > 0 && !selectedCoinId) { setSelectedCoinId(coins[0].id); setBuyPrice(coins[0].current_price.toString()); } }, [coins]);

      const portfolioItems = useMemo(() => {
        return (userProfile?.portfolio || []).map(item => {
          const live = coins.find(c => c.id === item.coinId);
          const cp = live ? live.current_price : parseFloat(item.buyPrice);
          const val = parseFloat(item.amount) * cp;
          const cost = parseFloat(item.amount) * parseFloat(item.buyPrice);
          return { ...item, name: live?.name || item.coinId, symbol: live?.symbol || "", image: live?.image || "", currentPrice: cp, currentValuation: val, costBasis: cost, pnlUsd: val - cost, pnlPercent: cost > 0 ? ((val - cost) / cost) * 100 : 0 };
        });
      }, [userProfile?.portfolio, coins]);

      const totals = useMemo(() => { let inv = 0, val = 0; portfolioItems.forEach(i => { inv += i.costBasis; val += i.currentValuation; }); return { inv, val, pnl: val - inv, pct: inv > 0 ? ((val - inv) / inv) * 100 : 0 }; }, [portfolioItems]);

      const handleAdd = async (e) => { e.preventDefault(); if (!selectedCoinId || !amount || !buyPrice) return; const newH = { id: "hold_" + Math.random().toString(36).substring(2, 9), coinId: selectedCoinId, amount: parseFloat(amount), buyPrice: parseFloat(buyPrice), addedAt: new Date().toISOString() }; await updatePortfolio([...(userProfile?.portfolio || []), newH]); setAmount(""); };
      const handleDelete = async (id) => { await updatePortfolio((userProfile?.portfolio || []).filter(i => i.id !== id)); };

      const selectStyle = { width: '100%', background: '#141421', border: '1px solid #1f2937', borderRadius: '0.75rem', padding: '0.5rem 0.75rem', fontSize: '0.75rem', color: '#fff' };
      const inputStyle = { width: '100%', background: '#141421', border: '1px solid #1f2937', borderRadius: '0.75rem', padding: '0.5rem 0.75rem', fontSize: '0.75rem', color: '#fff' };

      return (
        <div className="space-y-8">
          <div><h1 style={{ fontSize: '1.5rem', fontWeight: 900, color: '#fff', margin: 0 }}>Portfolio Simulator</h1><p style={{ color: '#9ca3af', fontSize: '0.75rem', marginTop: '0.25rem' }}>Track simulated purchases in real time.</p></div>

          <div className="grid grid-cols-2 grid-cols-md-4" style={{ gap: '1.5rem' }}>
            {[{ label: "Net Valuation", val: "$" + totals.val.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }), color: '#fff' },
              { label: "Invested", val: "$" + totals.inv.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }), color: '#fff' },
              { label: "Return (USD)", val: (totals.pnl >= 0 ? "+" : "") + "$" + totals.pnl.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }), color: totals.pnl >= 0 ? '#22c55e' : '#ef4444' },
              { label: "Return (%)", val: (totals.pnl >= 0 ? "▲" : "▼") + " " + Math.abs(totals.pct).toFixed(2) + "%", color: totals.pnl >= 0 ? '#22c55e' : '#ef4444' }
            ].map((m, i) => <div key={i} className="glass-panel" style={{ padding: '1.5rem', borderRadius: '1rem' }}><span style={{ fontSize: '0.75rem', fontWeight: 700, color: '#6b7280', textTransform: 'uppercase', letterSpacing: '0.05em', display: 'block' }}>{m.label}</span><span style={{ fontSize: '1.25rem', fontWeight: 800, color: m.color, marginTop: '0.25rem', display: 'block' }}>{m.val}</span></div>)}
          </div>

          <div className="grid grid-cols-1 grid-cols-lg-3" style={{ gap: '1.5rem' }}>
            <div style={{ gridColumn: 'span 2' }} className="glass-panel" >
              <div style={{ padding: '1.5rem', borderRadius: '1rem' }}>
                <h2 style={{ fontSize: '1rem', fontWeight: 700, color: '#fff', margin: '0 0 1rem' }}>Simulated Holdings</h2>
                {portfolioItems.length === 0 ? <div style={{ padding: '4rem', textAlign: 'center', color: '#6b7280', fontSize: '0.875rem', border: '1px dashed #1f2937', borderRadius: '1rem' }}>No holdings. Use the form to record purchases.</div> :
                <div style={{ overflowX: 'auto' }}>
                  <table style={{ width: '100%', textAlign: 'left' }}>
                    <thead><tr style={{ borderBottom: '1px solid #1f2937', fontSize: '10px', textTransform: 'uppercase', fontWeight: 700, color: '#6b7280' }}><th style={{ paddingBottom: '0.75rem' }}>Asset</th><th style={{ paddingBottom: '0.75rem', textAlign: 'right' }}>Amount</th><th style={{ paddingBottom: '0.75rem', textAlign: 'right' }}>Buy Price</th><th style={{ paddingBottom: '0.75rem', textAlign: 'right' }}>Current</th><th style={{ paddingBottom: '0.75rem', textAlign: 'right' }}>Value</th><th style={{ paddingBottom: '0.75rem', textAlign: 'right' }}>P&L</th><th style={{ paddingBottom: '0.75rem', textAlign: 'center' }}>Del</th></tr></thead>
                    <tbody>{portfolioItems.map(item => { const isP = item.pnlUsd >= 0; return (<tr key={item.id} style={{ borderBottom: '1px solid rgba(31,41,55,0.5)', fontSize: '0.875rem', fontWeight: 600 }}><td style={{ padding: '0.75rem 0', display: 'flex', alignItems: 'center', gap: '0.5rem' }}>{item.image && <img src={item.image} alt={item.name} style={{ width: '1.25rem', height: '1.25rem', borderRadius: '9999px' }}/>}<span style={{ color: '#fff' }}>{item.name}</span></td><td style={{ padding: '0.75rem 0', textAlign: 'right', color: '#fff' }}>{item.amount}</td><td style={{ padding: '0.75rem 0', textAlign: 'right', color: '#9ca3af' }}>${parseFloat(item.buyPrice).toLocaleString(undefined, { maximumFractionDigits: 6 })}</td><td style={{ padding: '0.75rem 0', textAlign: 'right', color: '#fff' }}>${item.currentPrice?.toLocaleString(undefined, { maximumFractionDigits: 6 })}</td><td style={{ padding: '0.75rem 0', textAlign: 'right', color: '#fff', fontWeight: 700 }}>${item.currentValuation?.toLocaleString(undefined, { maximumFractionDigits: 2 })}</td><td style={{ padding: '0.75rem 0', textAlign: 'right', fontWeight: 700, color: isP ? '#22c55e' : '#ef4444' }}>{isP ? "+" : ""}${item.pnlUsd?.toLocaleString(undefined, { maximumFractionDigits: 2 })}</td><td style={{ padding: '0.75rem 0', textAlign: 'center' }}><button onClick={() => handleDelete(item.id)} style={{ background: 'transparent', border: 'none', color: '#6b7280', cursor: 'pointer' }}><Icons.Trash2 size={16}/></button></td></tr>); })}</tbody>
                  </table>
                </div>}
              </div>
            </div>

            <form onSubmit={handleAdd} className="glass-panel" style={{ padding: '1.5rem', borderRadius: '1rem' }}>
              <h2 style={{ fontSize: '0.875rem', fontWeight: 700, color: '#fff', display: 'flex', alignItems: 'center', gap: '0.375rem', margin: '0 0 1rem' }}><Icons.Plus size={16} style={{ color: '#3b82f6' }}/> Record Trade</h2>
              <div className="space-y-3">
                <div><label style={{ fontSize: '10px', color: '#6b7280', fontWeight: 700, textTransform: 'uppercase', display: 'block', marginBottom: '0.25rem' }}>Asset</label><select value={selectedCoinId} onChange={e => { setSelectedCoinId(e.target.value); const c = coins.find(x => x.id === e.target.value); if (c) setBuyPrice(c.current_price.toString()); }} style={selectStyle}>{coins.map(c => <option key={c.id} value={c.id}>{c.name} ({c.symbol.toUpperCase()})</option>)}</select></div>
                <div><label style={{ fontSize: '10px', color: '#6b7280', fontWeight: 700, textTransform: 'uppercase', display: 'block', marginBottom: '0.25rem' }}>Amount</label><input type="number" step="any" required value={amount} onChange={e => setAmount(e.target.value)} placeholder="e.g. 0.05" style={inputStyle}/></div>
                <div><label style={{ fontSize: '10px', color: '#6b7280', fontWeight: 700, textTransform: 'uppercase', display: 'block', marginBottom: '0.25rem' }}>Buy Price (USD)</label><input type="number" step="any" required value={buyPrice} onChange={e => setBuyPrice(e.target.value)} style={inputStyle}/></div>
                <button type="submit" style={{ width: '100%', background: '#2563eb', color: '#fff', fontWeight: 700, padding: '0.625rem', borderRadius: '0.75rem', border: 'none', cursor: 'pointer', fontSize: '0.75rem', marginTop: '0.5rem' }}>Add to Portfolio</button>
              </div>
            </form>
          </div>
        </div>
      );
    }

    // =====================================================
    // SECTION 11: ALERT MANAGER (Simplified)
    // =====================================================
    function AlertManager({ coins }) {
      const { userProfile, addAlert, toggleAlert, deleteAlert } = useAuth();
      const [selectedCoinId, setSelectedCoinId] = useState("");
      const [threshold, setThreshold] = useState("");
      const [direction, setDirection] = useState("above");
      const [msg, setMsg] = useState("");

      useEffect(() => { if (coins.length > 0 && !selectedCoinId) { setSelectedCoinId(coins[0].id); setThreshold(coins[0].current_price.toString()); } }, [coins]);

      const handleCreate = async (e) => { e.preventDefault(); if (!selectedCoinId || !threshold) return; const coin = coins.find(c => c.id === selectedCoinId); if (!coin) return; await addAlert({ coinId: selectedCoinId, coinName: coin.name, coinSymbol: coin.symbol, threshold: parseFloat(threshold), type: direction }); setMsg("Alert created for " + coin.name + "!"); setThreshold(""); setTimeout(() => setMsg(""), 3000); };
      const inputStyle = { width: '100%', background: '#141421', border: '1px solid #1f2937', borderRadius: '0.75rem', padding: '0.5rem 0.75rem', fontSize: '0.75rem', color: '#fff' };

      return (
        <div className="space-y-6">
          <div><h1 style={{ fontSize: '1.5rem', fontWeight: 900, color: '#fff', margin: 0 }}>Alert Manager</h1><p style={{ color: '#9ca3af', fontSize: '0.75rem', marginTop: '0.25rem' }}>Configure price alert conditions.</p></div>
          {msg && <div style={{ padding: '0.75rem', borderRadius: '0.5rem', background: 'rgba(30,120,30,0.15)', border: '1px solid rgba(30,120,30,0.25)', color: '#4ade80', fontSize: '0.875rem', display: 'flex', alignItems: 'center', gap: '0.5rem' }}><Icons.CheckCircle2 size={16}/>{msg}</div>}

          <div className="grid grid-cols-1 grid-cols-lg-3" style={{ gap: '1.5rem' }}>
            <form onSubmit={handleCreate} className="glass-panel" style={{ padding: '1.5rem', borderRadius: '1rem' }}>
              <h2 style={{ fontSize: '0.875rem', fontWeight: 700, color: '#fff', display: 'flex', alignItems: 'center', gap: '0.375rem', margin: '0 0 1rem', paddingBottom: '0.75rem', borderBottom: '1px solid rgba(31,41,55,0.5)' }}><Icons.Bell size={16} style={{ color: '#3b82f6' }}/> Create Price Alert</h2>
              <div className="space-y-3">
                <div><label style={{ fontSize: '10px', color: '#6b7280', fontWeight: 700, textTransform: 'uppercase', display: 'block', marginBottom: '0.25rem' }}>Select Coin</label><select value={selectedCoinId} onChange={e => { setSelectedCoinId(e.target.value); const c = coins.find(x => x.id === e.target.value); if (c) setThreshold(c.current_price.toString()); }} style={inputStyle}>{coins.map(c => <option key={c.id} value={c.id}>{c.name} ({c.symbol.toUpperCase()})</option>)}</select></div>
                <div><label style={{ fontSize: '10px', color: '#6b7280', fontWeight: 700, textTransform: 'uppercase', display: 'block', marginBottom: '0.25rem' }}>Condition</label><div style={{ display: 'flex', gap: '0.5rem' }}>{["above", "below"].map(d => <button key={d} type="button" onClick={() => setDirection(d)} style={{ flex: 1, padding: '0.5rem', fontSize: '0.75rem', fontWeight: 700, borderRadius: '0.75rem', border: '1px solid ' + (direction === d ? (d === "above" ? '#3b82f6' : '#ef4444') : '#1f2937'), background: direction === d ? (d === "above" ? 'rgba(37,99,235,0.1)' : 'rgba(239,68,68,0.1)') : 'transparent', color: direction === d ? (d === "above" ? '#60a5fa' : '#f87171') : '#9ca3af', cursor: 'pointer' }}>{d === "above" ? "Goes Above (▲)" : "Goes Below (▼)"}</button>)}</div></div>
                <div><label style={{ fontSize: '10px', color: '#6b7280', fontWeight: 700, textTransform: 'uppercase', display: 'block', marginBottom: '0.25rem' }}>Target Price (USD)</label><input type="number" step="any" required value={threshold} onChange={e => setThreshold(e.target.value)} style={inputStyle}/></div>
                <button type="submit" style={{ width: '100%', background: '#2563eb', color: '#fff', fontWeight: 700, padding: '0.625rem', borderRadius: '0.75rem', border: 'none', cursor: 'pointer', fontSize: '0.75rem', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '0.375rem', marginTop: '0.5rem' }}><Icons.Send size={14}/> Create Alert</button>
              </div>
            </form>

            <div style={{ gridColumn: 'span 2' }} className="glass-panel">
              <div style={{ padding: '1.5rem', borderRadius: '1rem' }}>
                <h2 style={{ fontSize: '1rem', fontWeight: 700, color: '#fff', margin: '0 0 1rem' }}>Active Alert Conditions</h2>
                {!userProfile?.alerts || userProfile.alerts.length === 0 ? <div style={{ padding: '2rem', textAlign: 'center', color: '#6b7280', fontSize: '0.75rem', border: '1px dashed #1f2937', borderRadius: '0.75rem' }}>No active price alerts.</div> :
                <div className="space-y-2" style={{ maxHeight: '400px', overflowY: 'auto' }}>
                  {userProfile.alerts.map(alert => {
                    const isAbove = alert.type === "above";
                    return (
                      <div key={alert.id} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0.875rem', background: 'rgba(17,24,39,0.3)', border: '1px solid rgba(31,41,55,0.5)', borderRadius: '0.75rem' }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '0.75rem' }}>
                          <input type="checkbox" checked={alert.isActive} onChange={() => toggleAlert(alert.id)} style={{ width: '1rem', height: '1rem', cursor: 'pointer' }}/>
                          <div><span style={{ fontSize: '0.875rem', fontWeight: 700, color: '#fff', textTransform: 'uppercase' }}>{alert.coinSymbol}</span><span style={{ fontSize: '0.75rem', color: '#9ca3af', marginLeft: '0.5rem' }}>if price goes {isAbove ? "Above" : "Below"} <strong style={{ color: isAbove ? '#22c55e' : '#ef4444' }}>${alert.threshold?.toLocaleString()}</strong></span></div>
                        </div>
                        <button onClick={() => deleteAlert(alert.id)} style={{ background: 'transparent', border: 'none', color: '#6b7280', cursor: 'pointer' }}><Icons.Trash2 size={16}/></button>
                      </div>
                    );
                  })}
                </div>}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // =====================================================
    // SECTION 12: NEWS & EVENTS (Simplified placeholder)
    // =====================================================
    function NewsEvents() {
      return (
        <div className="space-y-6">
          <div><h1 style={{ fontSize: '1.5rem', fontWeight: 900, color: '#fff', margin: 0 }}>News Feed & Market Events</h1><p style={{ color: '#9ca3af', fontSize: '0.75rem', marginTop: '0.25rem' }}>Aggregated cryptocurrency news and upcoming catalysts.</p></div>
          <div className="glass-panel" style={{ padding: '2rem', borderRadius: '1rem', textAlign: 'center' }}>

    // =====================================================
    // SECTION 13: GLOSSARY (with built-in terms)
    // =====================================================
    function Glossary() {
      const [searchTerm, setSearchTerm] = useState("");
      const [activeTerm, setActiveTerm] = useState(null);
      const terms = [
        { term: "HODL", definition: "A slang term meaning to hold assets long-term rather than selling, originating from a typo of 'hold' on a Bitcoin forum in 2013.", category: "Slang" },
        { term: "DeFi", definition: "Decentralized Finance — an ecosystem of financial apps built on blockchains, operating without traditional intermediaries.", category: "Ecosystem" },
        { term: "Gas Fee", definition: "The transaction fee paid to network validators to process actions on blockchains like Ethereum.", category: "Technical" },
        { term: "Staking", definition: "Locking up crypto assets to participate in transaction validation on Proof-of-Stake blockchains in exchange for yield.", category: "Economics" },
        { term: "Smart Contract", definition: "Self-executing digital contracts with terms written into code, executing automatically when conditions are met.", category: "Technical" },
        { term: "Web3", definition: "The vision for a decentralized, read-write-own internet powered by blockchain networks.", category: "Ecosystem" },
        { term: "Stablecoin", definition: "Cryptocurrencies designed to maintain stable value pegged to fiat currencies or commodities.", category: "Economics" },
        { term: "Liquidity Pool", definition: "A crowdsourced pool of tokens locked in smart contracts used to facilitate DEX trading.", category: "DeFi" },
        { term: "dApp", definition: "Decentralized Application — apps that run on blockchains, utilizing smart contracts for backend logic.", category: "Technical" },
      ];
      const filtered = terms.filter(t => t.term.toLowerCase().includes(searchTerm.toLowerCase()) || t.category.toLowerCase().includes(searchTerm.toLowerCase()));

      return (
        <div className="space-y-6">
          <div><h1 style={{ fontSize: '1.5rem', fontWeight: 900, color: '#fff', margin: 0 }}>Crypto Glossary</h1><p style={{ color: '#9ca3af', fontSize: '0.75rem', marginTop: '0.25rem' }}>Browse core blockchain and cryptocurrency terms.</p></div>
          <div className="grid grid-cols-1 grid-cols-lg-3" style={{ gap: '1.5rem' }}>
            <div className="space-y-4">
              <div style={{ position: 'relative' }}><Icons.Search style={{ position: 'absolute', left: '0.75rem', top: '0.75rem', color: '#6b7280' }} size={16}/><input type="text" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} placeholder="Search terms..." style={{ width: '100%', background: '#0d0d14', border: '1px solid #1f2937', borderRadius: '0.75rem', padding: '0.625rem 1rem 0.625rem 2.5rem', fontSize: '0.75rem', color: '#fff' }}/></div>
              <div className="glass-panel" style={{ padding: '1rem', borderRadius: '1rem', maxHeight: '500px', overflowY: 'auto' }}>
                {filtered.map(t => <button key={t.term} onClick={() => setActiveTerm(t)} style={{ width: '100%', textAlign: 'left', padding: '0.75rem 1rem', borderRadius: '0.75rem', border: '1px solid ' + (activeTerm?.term === t.term ? '#3b82f6' : 'rgba(31,41,55,0.5)'), background: activeTerm?.term === t.term ? 'rgba(37,99,235,0.1)' : 'transparent', color: activeTerm?.term === t.term ? '#60a5fa' : '#d1d5db', cursor: 'pointer', display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.5rem', fontSize: '0.875rem', fontWeight: 600 }}><span>{t.term}</span><span style={{ fontSize: '10px', textTransform: 'uppercase', padding: '0.0625rem 0.5rem', background: 'rgba(31,41,55,0.6)', color: '#9ca3af', borderRadius: '0.375rem', fontWeight: 600, border: '1px solid #1f2937' }}>{t.category}</span></button>)}
              </div>
            </div>
            <div style={{ gridColumn: 'span 2' }} className="glass-panel">
              <div style={{ padding: '1.5rem', borderRadius: '1rem', minHeight: '300px', display: 'flex', flexDirection: 'column', justifyContent: 'center' }}>
                {activeTerm ? (
                  <div className="space-y-4">
                    <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', borderBottom: '1px solid #1f2937', paddingBottom: '0.75rem' }}><div style={{ background: 'rgba(37,99,235,0.1)', padding: '0.5rem', borderRadius: '0.5rem', color: '#60a5fa' }}><Icons.BookOpen size={18}/></div><div><h3 style={{ fontSize: '1.125rem', fontWeight: 900, color: '#fff', margin: 0 }}>{activeTerm.term}</h3><span style={{ fontSize: '10px', color: '#6b7280', textTransform: 'uppercase', letterSpacing: '0.05em', fontWeight: 600 }}>Classification: {activeTerm.category}</span></div></div>
                    <p style={{ color: '#d1d5db', fontSize: '0.875rem', lineHeight: 1.625 }}>{activeTerm.definition}</p>
                  </div>
                ) : (
                  <div style={{ textAlign: 'center', color: '#6b7280', padding: '4rem 0' }}><Icons.BookOpen size={48} style={{ color: '#374151', margin: '0 auto 0.75rem' }}/><p style={{ fontWeight: 600, fontSize: '0.875rem', margin: 0 }}>Select a glossary term from the left panel.</p></div>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // =====================================================
    // SECTION 14: MAIN APP SHELL
    // =====================================================
    function AuthGuard({ children }) {
      const { currentUser, loading } = useAuth();
      if (loading) return <div style={{ minHeight: '100vh', background: '#0a0a0f', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#9ca3af' }}><div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '1rem' }}><div className="spinner"></div><p style={{ fontSize: '0.875rem', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.025em' }}>Securing Session...</p></div></div>;
      return currentUser ? children : <Navigate to="/login" replace/>;
    }

    function AppLayout({ coins, loading, lastUpdated, fetchMarketData, countdown, isOnline }) {
      const [sidebarOpen, setSidebarOpen] = useState(false);
      return (
        <div style={{ display: 'flex', height: '100vh', background: '#0a0a0f', overflow: 'hidden' }}>
          <Sidebar isOpen={sidebarOpen} setIsOpen={setSidebarOpen}/>
          <div className="app-main">
            <LiveTicker coins={coins} loading={loading} isOnline={isOnline}/>
            <main className="app-content">
              <Routes>
                <Route path="/" element={<Dashboard coins={coins} loading={loading} lastUpdated={lastUpdated} fetchMarketData={fetchMarketData} countdown={countdown}/>}/>
                <Route path="/market" element={<Market coins={coins} loading={loading}/>}/>
                <Route path="/coin/:id" element={<CoinDetail coins={coins}/>}/>
                <Route path="/watchlist" element={<Watchlist coins={coins} loading={loading}/>}/>
                <Route path="/news" element={<NewsEvents/>}/>
                <Route path="/portfolio" element={<Portfolio coins={coins}/>}/>
                <Route path="/alerts" element={<AlertManager coins={coins}/>}/>
                <Route path="/glossary" element={<Glossary/>}/>
                <Route path="*" element={<Navigate to="/" replace/>}/>
              </Routes>
            </main>
          </div>
        </div>
      );
    }

    function MainApp() {
      const { currentUser } = useAuth();
      const [coins, setCoins] = useState([]);
      const [loading, setLoading] = useState(true);
      const [lastUpdated, setLastUpdated] = useState(null);
      const [countdown, setCountdown] = useState(60);
      const [isOnline, setIsOnline] = useState(true);

      const fetchMarketData = useCallback(async (force = false) => {
        const lastFetch = localStorage.getItem("last_coingecko_fetch_time");
        const now = Date.now();
        if (!force && lastFetch && now - parseInt(lastFetch) < 10000 && coins.length > 0) return;
        setLoading(true);
        try {
          const res = await fetch("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=250&page=1&sparkline=true&price_change_percentage=24h,7d,30d");
          const data = await res.json();
          if (Array.isArray(data)) {
            setCoins(prev => {
              if (prev.length === 0) return data;
              return data.map(nc => { const oc = prev.find(c => c.id === nc.id); let fc = ""; if (oc) { if (nc.current_price > oc.current_price) fc = "flash-green-bg"; else if (nc.current_price < oc.current_price) fc = "flash-red-bg"; } return { ...nc, flashClass: fc }; });
            });
            setIsOnline(true); setLastUpdated(new Date());
            localStorage.setItem("last_coingecko_fetch_time", Date.now().toString());
            localStorage.setItem("cached_coingecko_data", JSON.stringify(data));
          }
        } catch (error) {
          console.error("CoinGecko API failed. Serving cache.", error);
          setIsOnline(false);
          const cached = localStorage.getItem("cached_coingecko_data");
          if (cached) setCoins(JSON.parse(cached));
        } finally { setLoading(false); setCountdown(60); }
      }, [coins.length]);

      useEffect(() => { fetchMarketData(); }, []);
      useEffect(() => { const timer = setInterval(() => { setCountdown(prev => { if (prev <= 1) { fetchMarketData(); return 60; } return prev - 1; }); }, 1000); return () => clearInterval(timer); }, [fetchMarketData]);
      useEffect(() => { const on = () => setIsOnline(true); const off = () => setIsOnline(false); window.addEventListener("online", on); window.addEventListener("offline", off); return () => { window.removeEventListener("online", on); window.removeEventListener("offline", off); }; }, []);

      return (
        <Router>
          <Routes>
            <Route path="/login" element={currentUser ? <Navigate to="/" replace/> : <LoginSignup/>}/>
            <Route path="/*" element={<AuthGuard><AppLayout coins={coins} loading={loading} lastUpdated={lastUpdated} fetchMarketData={fetchMarketData} countdown={countdown} isOnline={isOnline}/></AuthGuard>}/>
          </Routes>
        </Router>
      );
    }

    function App() {
      return <AuthProvider><MainApp/></AuthProvider>;
    }

    // =====================================================
    // RENDER
    // =====================================================
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App/>);
  </script>
</body>
</html>
